<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Movie Rec</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
/* ============================================
   DESIGN TOKENS
   Apple Keynote Clean — Inter, white, poster-first
   ui-ux-pro-max: 8dp spacing, 44px touch targets,
   4.5:1 contrast, 150-300ms transitions
   ============================================ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root {
  --white: #ffffff;
  --bg: #f5f5f7;
  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #aeaeb2;
  --accent: #0071e3;
  --danger: #ff3b30;
  --success: #34c759;
  --warning: #ff9500;
  --surface: rgba(255,255,255,0.92);
  --border: rgba(0,0,0,0.06);
  --shadow-soft: 0 8px 40px rgba(0,0,0,0.08);
  --shadow-card: 0 12px 48px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  --shadow-elevated: 0 20px 60px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.08);
  --radius: 20px;
  --radius-sm: 12px;
  --radius-pill: 100px;
  --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1.0);
  --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --duration: 250ms;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  width: 100vw;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* Three.js background canvas */
#three-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
  opacity: 0.35;
}

/* App shell */
.app {
  position: relative;
  z-index: 1;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ---- HEADER ---- */
.header {
  padding: 16px 24px 0;
  flex-shrink: 0;
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text-primary);
  line-height: 1.15;
}
.header .subtitle {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-secondary);
  margin-top: 4px;
  letter-spacing: -0.1px;
}

/* ---- CATEGORY PILLS ---- */
.category-nav {
  display: flex;
  gap: 8px;
  padding: 16px 24px 12px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.category-nav::-webkit-scrollbar { display: none; }

.cat-pill {
  white-space: nowrap;
  padding: 8px 20px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.1px;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
  flex-shrink: 0;
  min-height: 36px;
  display: flex;
  align-items: center;
}
.cat-pill.active {
  background: var(--text-primary);
  color: var(--white);
  border-color: var(--text-primary);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.cat-pill:not(.active):hover {
  background: rgba(0,0,0,0.04);
}

/* ---- POSTER STACK AREA ---- */
.stack-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
}

/* Stack container */
.stack {
  position: relative;
  width: 88%;
  max-width: 370px;
  aspect-ratio: 2/3;
}

/* Individual poster card */
.poster-card {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.5s var(--ease-out);
  will-change: transform;
}
.poster-card.flipped {
  transform: rotateY(180deg);
}

/* Front face */
.card-front {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  backface-visibility: hidden;
  border-radius: var(--radius);
  overflow: hidden;
  background: #1a1a1a;
  box-shadow: var(--shadow-elevated);
}
.card-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  /* NO filters, NO overlays, NO opacity changes — pure poster art */
}
.card-front .title-overlay {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  padding: 48px 20px 18px;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
}
.card-front .title-overlay h2 {
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.3px;
  line-height: 1.25;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.card-front .title-overlay .year {
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  margin-top: 2px;
}

/* Back face */
.card-back {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  backface-visibility: hidden;
  transform: rotateY(180deg);
  border-radius: var(--radius);
  background: var(--white);
  box-shadow: var(--shadow-elevated);
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 20px;
  -webkit-overflow-scrolling: touch;
}

.back-header {
  margin-bottom: 16px;
}
.back-header h2 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text-primary);
  line-height: 1.2;
}
.back-header .meta {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.back-header .lb-score {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  background: rgba(0,113,227,0.06);
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
}
.back-synopsis {
  font-size: 14px;
  line-height: 1.65;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

/* Quotes */
.quote-block {
  margin-bottom: 16px;
}
.quote {
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  line-height: 1.6;
  font-style: italic;
  margin-bottom: 8px;
}
.quote-1star {
  background: rgba(255,59,48,0.04);
  border-left: 3px solid rgba(255,59,48,0.25);
  color: var(--text-secondary);
}
.quote-5star {
  background: rgba(52,199,89,0.04);
  border-left: 3px solid rgba(52,199,89,0.25);
  color: var(--text-secondary);
}

/* Streaming */
.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-tertiary);
  margin-bottom: 10px;
}
.stream-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.stream-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  background: var(--bg);
  color: var(--text-secondary);
  text-decoration: none;
  border: 1px solid var(--border);
  transition: all var(--duration) var(--ease-out);
  min-height: 36px;
  cursor: pointer;
}
.stream-link:hover {
  background: var(--accent);
  color: var(--white);
  border-color: var(--accent);
}
.stream-link svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

/* Actions row */
.actions-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 20px;
}
.action-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
  color: var(--text-secondary);
}
.action-btn:hover, .action-btn.active {
  background: var(--text-primary);
  color: var(--white);
  border-color: var(--text-primary);
  transform: scale(1.06);
}
.action-btn svg {
  width: 18px;
  height: 18px;
}

/* Star rating */
.star-row {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 8px;
}
.star-btn {
  width: 32px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: color var(--duration) var(--ease-out);
}
.star-btn svg {
  width: 22px;
  height: 22px;
  color: rgba(0,0,0,0.1);
  transition: color 0.15s ease;
}
.star-btn.filled svg {
  color: var(--warning);
}

/* ---- BOTTOM BAR ---- */
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px 28px;
  flex-shrink: 0;
}
.shuffle-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-pill);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
  min-height: 44px;
}
.shuffle-btn:hover {
  background: var(--text-primary);
  color: var(--white);
  border-color: var(--text-primary);
}
.shuffle-btn svg {
  width: 16px;
  height: 16px;
}
.counter {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-tertiary);
  letter-spacing: -0.1px;
}
.hint {
  font-size: 11px;
  color: var(--text-tertiary);
  opacity: 0.5;
  letter-spacing: 0.3px;
}

/* Stack depth cards (behind) */
.depth-card {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border-radius: var(--radius);
  overflow: hidden;
  pointer-events: none;
}
.depth-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
</style>
</head>
<body>
<canvas id="three-canvas"></canvas>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <h1>Movie Rec</h1>
        <p class="subtitle">Deep cuts based on The Divide</p>
      </div>
    </div>

  <div class="category-nav" id="categoryNav"></div>

  <div class="stack-area" id="stackArea">
    <div class="stack" id="stack"></div>
  </div>

  <div class="bottom-bar">
    <button class="shuffle-btn" id="shuffleBtn" aria-label="Shuffle movies">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      Shuffle
    </button>
    <span class="hint">swipe up / down</span>
    <span class="counter" id="counter"></span>
  </div>
</div>

// ============================================
// SVG ICON LIBRARY (Lucide-style, no emoji)

const icons = {

// ============================================
// STREAMING URL BUILDERS
// ============================================
function streamUrl(platform, title) {
  const t = encodeURIComponent(title);
  const h = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
  const map = {
    "Netflix": "https://www.netflix.com/search?q=" + t,
    "Amazon Prime": "https://www.amazon.com/s?k=" + t + "&i=instant-video",
    "Shudder": "https://www.shudder.com/search?q=" + t,
    "Tubi": "https://tubitv.com/search/" + t,
    "Pluto TV": "https://pluto.tv/search/details/" + t,
    "Dopebox": "https://dopebox.to/search/" + h
  };
  return map[platform] || '#';
}

// ============================================
// STATE
// ============================================
const tiers = [
  {key:"direct", label:"Direct Matches"},
  {key:"claustrophobic", label:"Claustrophobic"},
  {key:"survival", label:"Survival"},
  {key:"adjacent", label:"Adjacent"}
];
let currentTier = "direct";
let filtered = [];
let idx = 0;
let isFlipped = false;
let isAnimating = false;
let userRatings = {};
let userActions = {};

// ============================================
// THREE.JS — Subtle ambient light shapes
// ============================================
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({canvas, alpha: true, antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 25;

scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dLight = new THREE.DirectionalLight(0xffffff, 0.3);
dLight.position.set(5, 10, 8);
scene.add(dLight);

// Floating ambient shapes — very subtle, blurred by CSS opacity
const shapeMeshes = [];
const geos = [
  new THREE.SphereGeometry(2, 32, 32),
  new THREE.TorusGeometry(1.5, 0.5, 16, 32),
  new THREE.OctahedronGeometry(1.8),
  new THREE.SphereGeometry(1, 32, 32)
];
const cols = [0x0071e3, 0xff9500, 0x34c759, 0xaf52de];
geos.forEach((g, i) => {
  const mat = new THREE.MeshPhongMaterial({color: cols[i], transparent: true, opacity: 0.06, shininess: 40});
  const mesh = new THREE.Mesh(g, mat);
  mesh.position.set((Math.random()-0.5)*18, (Math.random()-0.5)*14, (Math.random()-0.5)*6);
  mesh.userData = {spd: 0.001 + Math.random()*0.002, off: Math.random()*Math.PI*2};
  scene.add(mesh);
  shapeMeshes.push(mesh);
});

function renderBg() {
  requestAnimationFrame(renderBg);
  const t = Date.now() * 0.001;
  shapeMeshes.forEach(m => {
    m.rotation.x += m.userData.spd;
    m.rotation.y += m.userData.spd * 0.7;
    m.position.y += Math.sin(t + m.userData.off) * 0.002;
  });
  renderer.render(scene, camera);
}
renderBg();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ============================================
// CATEGORY PILLS
// ============================================
const navEl = document.getElementById('categoryNav');
tiers.forEach(t => {
  const pill = document.createElement('button');
  pill.className = 'cat-pill' + (t.key === 'direct' ? ' active' : '');
  pill.textContent = t.label;
  pill.setAttribute('role', 'tab');
  pill.setAttribute('aria-selected', t.key === 'direct' ? 'true' : 'false');
  pill.addEventListener('click', () => {
    document.querySelectorAll('.cat-pill').forEach(p => {
      p.classList.remove('active');
      p.setAttribute('aria-selected', 'false');
    });
    pill.classList.add('active');
    pill.setAttribute('aria-selected', 'true');
    currentTier = t.key;
    filterAndRender();
  });
  navEl.appendChild(pill);
});

// ============================================
// RENDER POSTER STACK
// ============================================
function filterAndRender() {
  filtered = movies.filter(m => m.tier === currentTier);
  idx = 0;
  isFlipped = false;
  renderStack();
}

function renderStack() {
  const stack = document.getElementById('stack');
  stack.textContent = '';
  if (!filtered.length) return;
  updateCounter();

  // Render depth cards (2 behind)
  for (let d = 2; d >= 1; d--) {
    const di = (idx + d) % filtered.length;
    const dm = filtered[di];
    const depthEl = document.createElement('div');
    depthEl.className = 'depth-card';
    const scale = 1 - d * 0.04;
    const yOff = d * 6;
    depthEl.style.cssText = 'transform:scale(' + scale + ') translateY(' + yOff + 'px);opacity:' + (0.6 - d*0.2) +
      ';box-shadow:0 ' + (4+d*4) + 'px ' + (16+d*8) + 'px rgba(0,0,0,' + (0.06+d*0.02) + ');z-index:' + (10-d);
    const dImg = document.createElement('img');
    dImg.src = dm.poster;
    dImg.alt = '';
    dImg.loading = 'lazy';
    depthEl.appendChild(dImg);
    stack.appendChild(depthEl);
  }

  // Top card
  const m = filtered[idx];
  const card = document.createElement('div');
  card.className = 'poster-card';
  card.style.zIndex = '20';
  card.setAttribute('role', 'article');
  card.setAttribute('aria-label', m.title + ' (' + m.year + ')');

  // FRONT
  const front = document.createElement('div');
  front.className = 'card-front';
  const img = document.createElement('img');
  img.src = m.poster;
  img.alt = m.title + ' poster';
  img.loading = 'eager';
  img.setAttribute('width', '370');
  img.setAttribute('height', '555');
  front.appendChild(img);

  const overlay = document.createElement('div');
  overlay.className = 'title-overlay';
  const h2 = document.createElement('h2');
  h2.textContent = m.title;
  const yearEl = document.createElement('div');
  yearEl.className = 'year';
  yearEl.textContent = m.year + ' \u2022 ' + m.director;
  overlay.appendChild(h2);
  overlay.appendChild(yearEl);
  front.appendChild(overlay);

  // BACK
  const back = document.createElement('div');
  back.className = 'card-back';

  // Header
  const bh = document.createElement('div');
  bh.className = 'back-header';
  const bTitle = document.createElement('h2');
  bTitle.textContent = m.title;
  const bMeta = document.createElement('div');
  bMeta.className = 'meta';
  bMeta.appendChild(document.createTextNode(m.year + ' \u2022 ' + m.director + ' '));
  const lbScore = document.createElement('span');
  lbScore.className = 'lb-score';
  lbScore.textContent = '\u2605 ' + m.rating;
  bMeta.appendChild(lbScore);
  bh.appendChild(bTitle);
  bh.appendChild(bMeta);
  back.appendChild(bh);

  // Synopsis
  const syn = document.createElement('p');
  syn.className = 'back-synopsis';
  syn.textContent = m.synopsis;
  back.appendChild(syn);

  // Quotes
  const qBlock = document.createElement('div');
  qBlock.className = 'quote-block';
  const q1 = document.createElement('div');
  q1.className = 'quote quote-1star';
  q1.textContent = m.q1;
  const q5 = document.createElement('div');
  q5.className = 'quote quote-5star';
  q5.textContent = m.q5;
  qBlock.appendChild(q1);
  qBlock.appendChild(q5);
  back.appendChild(qBlock);

  // Streaming
  const sLabel = document.createElement('div');
  sLabel.className = 'section-label';
  sLabel.textContent = 'Where to Watch';
  back.appendChild(sLabel);

  const sGrid = document.createElement('div');
  sGrid.className = 'stream-grid';
  const allPlatforms = [...m.streaming, 'Dopebox'];
  allPlatforms.forEach(p => {
    const a = document.createElement('a');
    a.href = streamUrl(p, m.title);
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'stream-link';
    a.setAttribute('aria-label', 'Watch on ' + p);
    const svgWrap = document.createElement('span');
    svgWrap.style.display = 'flex';
    const parser = new DOMParser();
    const svgDoc = parser.parseFromString(icons.play, 'image/svg+xml');
    svgWrap.appendChild(svgDoc.documentElement);
    a.appendChild(svgWrap);
    a.appendChild(document.createTextNode(p));
    sGrid.appendChild(a);
  });
  back.appendChild(sGrid);

  // Actions
  const aLabel = document.createElement('div');
  aLabel.className = 'section-label';
  aLabel.textContent = 'Your Reaction';
  back.appendChild(aLabel);

  const aRow = document.createElement('div');
  aRow.className = 'actions-row';
  const actionDefs = [
    {key:'like', icon:icons.thumbsUp, label:'Like'},
    {key:'notlike', icon:icons.thumbsDown, label:'Not for me'},
    {key:'love', icon:icons.heart, label:'Love'},
    {key:'watched', icon:icons.eye, label:'Watched'},
    {key:'save', icon:icons.bookmark, label:'Save for later'}
  ];
  actionDefs.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'action-btn' + (userActions[m.id] === a.key ? ' active' : '');
    btn.setAttribute('aria-label', a.label);
    btn.setAttribute('aria-pressed', userActions[m.id] === a.key ? 'true' : 'false');
    const parser = new DOMParser();
    const svgDoc = parser.parseFromString(a.icon, 'image/svg+xml');
    btn.appendChild(svgDoc.documentElement);
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const wasActive = userActions[m.id] === a.key;
      userActions[m.id] = wasActive ? null : a.key;
      aRow.querySelectorAll('.action-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      if (!wasActive) {
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
      }
    });
    aRow.appendChild(btn);
  });
  back.appendChild(aRow);

  // Star rating
  const srLabel = document.createElement('div');
  srLabel.className = 'section-label';
  srLabel.textContent = 'Your Rating';
  back.appendChild(srLabel);

  const starRow = document.createElement('div');
  starRow.className = 'star-row';
  starRow.setAttribute('role', 'radiogroup');
  starRow.setAttribute('aria-label', 'Rate this movie 1 to 5 stars');
  for (let i = 1; i <= 5; i++) {
    const sb = document.createElement('button');
    sb.className = 'star-btn' + ((userRatings[m.id] || 0) >= i ? ' filled' : '');
    sb.setAttribute('role', 'radio');
    sb.setAttribute('aria-checked', (userRatings[m.id] || 0) >= i ? 'true' : 'false');
    sb.setAttribute('aria-label', i + ' star' + (i > 1 ? 's' : ''));
    const parser = new DOMParser();
    const svgDoc = parser.parseFromString(
      (userRatings[m.id] || 0) >= i ? icons.starFilled : icons.star,
      'image/svg+xml'
    );
    sb.appendChild(svgDoc.documentElement);
    sb.addEventListener('click', (e) => {
      e.stopPropagation();
      userRatings[m.id] = userRatings[m.id] === i ? 0 : i;
      // Re-render stars
      starRow.querySelectorAll('.star-btn').forEach((s, j) => {
        const filled = j < (userRatings[m.id] || 0);
        s.className = 'star-btn' + (filled ? ' filled' : '');
        s.setAttribute('aria-checked', filled ? 'true' : 'false');
        s.textContent = '';
        const p2 = new DOMParser();
        const sd2 = p2.parseFromString(filled ? icons.starFilled : icons.star, 'image/svg+xml');
        s.appendChild(sd2.documentElement);
      });
    });
    starRow.appendChild(sb);
  }
  back.appendChild(starRow);

  card.appendChild(front);
  card.appendChild(back);
  stack.appendChild(card);

  // Tap to flip
  card.addEventListener('click', () => {
    isFlipped = !isFlipped;
    card.classList.toggle('flipped', isFlipped);
  });

  // Entry animation
  gsap.fromTo(card,
    {y: 40, opacity: 0, scale: 0.95},
    {y: 0, opacity: 1, scale: 1, duration: 0.4, ease: 'power3.out'}
  );
}

function updateCounter() {
  document.getElementById('counter').textContent = (idx + 1) + ' / ' + filtered.length;
}

// ============================================
// SWIPE PHYSICS — UP/DOWN to peel through stack
// ============================================
let touchStartY = 0, touchStartTime = 0;
const stackArea = document.getElementById('stackArea');

stackArea.addEventListener('touchstart', (e) => {
  if (isAnimating) return;
  touchStartY = e.touches[0].clientY;
  touchStartTime = Date.now();
}, {passive: true});

stackArea.addEventListener('touchend', (e) => {
  if (isAnimating) return;
  const dy = touchStartY - e.changedTouches[0].clientY;
  const dt = Date.now() - touchStartTime;
  const velocity = Math.abs(dy) / Math.max(dt, 1);

  if (Math.abs(dy) > 40) {
    const dir = dy > 0 ? 1 : -1;
    if (velocity > 1.2) {
      // Fast flick — spin through multiple
      const count = Math.min(Math.floor(velocity * 1.5), filtered.length - 1);
      spinThrough(dir, count);
    } else {
      navigate(dir);
    }
  }
}, {passive: true});

// Mouse drag support
let mouseDown = false, mouseStartY = 0, mouseStartTime = 0;
stackArea.addEventListener('mousedown', (e) => {
  if (isAnimating) return;
  mouseDown = true;
  mouseStartY = e.clientY;
  mouseStartTime = Date.now();
});
window.addEventListener('mouseup', (e) => {
  if (!mouseDown) return;
  mouseDown = false;
  const dy = mouseStartY - e.clientY;
  const dt = Date.now() - mouseStartTime;
  const velocity = Math.abs(dy) / Math.max(dt, 1);
  if (Math.abs(dy) > 40) {
    const dir = dy > 0 ? 1 : -1;
    if (velocity > 1.2) {
      spinThrough(dir, Math.min(Math.floor(velocity * 1.5), filtered.length - 1));
    } else {
      navigate(dir);
    }
  }
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') navigate(-1);
  else if (e.key === 'ArrowDown') navigate(1);
  else if (e.key === ' ') {
    e.preventDefault();
    const card = document.querySelector('.poster-card');
    if (card) card.click();
  }
});

// Navigate one card
function navigate(dir) {
  if (isAnimating || !filtered.length) return;
  isAnimating = true;
  isFlipped = false;

  const card = document.querySelector('.poster-card');
  if (!card) { isAnimating = false; return; }

  // Peel animation — arc upward with slight rotation
  gsap.to(card, {
    y: dir > 0 ? -180 : 180,
    opacity: 0,
    scale: 0.85,
    rotationX: dir * 8,
    duration: 0.3,
    ease: 'power2.in',
    onComplete: () => {
      idx = (idx + dir + filtered.length) % filtered.length;
      renderStack();
      isAnimating = false;
    }
  });
}

// Spin through multiple (physics momentum)
function spinThrough(dir, count) {
  if (isAnimating || !filtered.length) return;
  isAnimating = true;
  isFlipped = false;

  let i = 0;
  function step() {
    if (i >= count) { isAnimating = false; return; }
    const card = document.querySelector('.poster-card');
    if (!card) { isAnimating = false; return; }

    // Progressive deceleration
    const progress = i / count;
    const duration = 0.08 + progress * 0.12;

    gsap.to(card, {
      y: dir > 0 ? -100 : 100,
      opacity: 0,
      scale: 0.9,
      duration: duration,
      ease: 'power1.in',
      onComplete: () => {
        idx = (idx + dir + filtered.length) % filtered.length;
        renderStack();
        i++;
        if (i < count) step();
        else isAnimating = false;
      }
    });
  }
  step();
}

// Shuffle — scatter and restack
document.getElementById('shuffleBtn').addEventListener('click', () => {
  if (isAnimating || !filtered.length) return;
  const count = 3 + Math.floor(Math.random() * 4);
  spinThrough(1, count);
});

// ============================================
// INIT
// ============================================
filterAndRender();
</script>
