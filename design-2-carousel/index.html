/* Three.js mount */
#mount { width: 100vw; height: 100vh; cursor: grab; }
#mount:active { cursor: grabbing; }

/* Vignette */
#vignette {

  pointer-events: none; z-index: 10;
}

/* UNCUT header — translucent overlay */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;

.logo-text {

.counter-txt { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.4); letter-spacing: 0.5px; }

.cat-nav {

.cat-pill {

.hint-txt { font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 0.5px; text-transform: uppercase; }

.gesture-toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.8);

.gesture-toast.hide { opacity:0; transform: translate(-50%,-50%) scale(0.9); transition: all 0.3s ease; }
.toast-icon { font-size: 22px; display: block; margin-bottom: 4px; }

  ctx.fillText(title, CANVAS_W/2, CANVAS_H/2 - 20);
  // Year + rating
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = Math.round(16 * TEXTURE_SCALE) + 'px sans-serif';
  ctx.fillText(movie.year + '  \u2022  \u2605 ' + movie.rating, CANVAS_W/2, CANVAS_H/2 + 20);
  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 2;
  roundRect(ctx, 2, 2, CANVAS_W-4, CANVAS_H-4, cr-1); ctx.stroke();
  ctx.restore();
}

function createPosterTexture(movie, callback) {
  var canvas = document.createElement('canvas');
  canvas.width = CANVAS_W; canvas.height = CANVAS_H;
  var ctx = canvas.getContext('2d');
  var cr = 20;
  var loaded = false;

  function drawPoster(img) {
    ctx.save();
    roundRect(ctx, 0, 0, CANVAS_W, CANVAS_H, cr); ctx.clip();
    var a = img.width/img.height, ca = CANVAS_W/CANVAS_H;
    var sw,sh,sx,sy;
    if (a > ca) { sh=img.height; sw=sh*ca; sx=(img.width-sw)/2; sy=0; }
    else { sw=img.width; sh=sw/ca; sx=0; sy=(img.height-sh)/2; }
    try { ctx.drawImage(img, sx,sy,sw,sh, 0,0,CANVAS_W,CANVAS_H); } catch(e) {}
    // Bottom overlay
    var oh = CANVAS_H * 0.14;
    var g = ctx.createLinearGradient(0, CANVAS_H-oh, 0, CANVAS_H);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(0.3,'rgba(0,0,0,0.4)'); g.addColorStop(1,'rgba(0,0,0,0.8)');
    ctx.fillStyle = g; ctx.fillRect(0, CANVAS_H-oh, CANVAS_W, oh);
    // Year — subtle
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = '500 '+Math.round(13*TEXTURE_SCALE)+'px sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.fillText(String(movie.year), 20, CANVAS_H-14);
    // Streaming service badges — branded circles with initials
    var badgeR = 10;
    var badgeGap = 4;
    var services = (movie.streaming||[]).slice();
    var totalBadgeW = services.length * badgeR * 2 + (services.length - 1) * badgeGap;
    var badgeX = CANVAS_W - 18 - totalBadgeW + badgeR;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    services.forEach(function(s) {
      // Branded circle
      ctx.beginPath(); ctx.arc(badgeX, CANVAS_H - 22, badgeR, 0, Math.PI * 2);
      ctx.fillStyle = streamColors[s] || '#666'; ctx.fill();
      // White border
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.stroke();
      // Service initial
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.round(11 * TEXTURE_SCALE / 1.68) + 'px sans-serif';
      ctx.fillText(s.charAt(0), badgeX, CANVAS_H - 22);
      badgeX += badgeR * 2 + badgeGap;
    });
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom'; // Reset alignment
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1.5;
    roundRect(ctx,1,1,CANVAS_W-2,CANVAS_H-2,cr); ctx.stroke();
    ctx.restore();
    callback(new THREE.CanvasTexture(canvas));
  }

  function useFallback() {
    if (loaded) return; loaded = true;
    drawFallbackPoster(ctx, movie, cr);
    callback(new THREE.CanvasTexture(canvas));
  }

  // Try loading with crossOrigin first (works on GitHub Pages)
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() { if (!loaded) { loaded = true; drawPoster(img); } };
  img.onerror = function() {
    // Retry WITHOUT crossOrigin (some CDNs reject it)
    var img2 = new Image();
    img2.onload = function() { if (!loaded) { loaded = true; drawPoster(img2); } };
    img2.onerror = useFallback;
    img2.src = movie.poster;
  };
  img.src = movie.poster;
  // Timeout fallback after 6 seconds
  setTimeout(useFallback, 6000);
}

// === BACK TEXTURE — Premium streaming-app detail card ===
// 8px grid system, Light frosted glass — Apple Invites / tasteskill.dev aesthetic
function wrapText(ctx, text, maxW, maxLines) {
  var words = (text||'').split(' '), line='', lines=[];
  for (var i=0; i<words.length && lines.length<maxLines; i++) {
    var test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line.trim()); line = words[i] + ' ';
    } else line = test;
  }
  if (line && lines.length < maxLines) {
    if (i < words.length) line = line.trim().replace(/...$/, '') + '\u2026';
    lines.push(line.trim());
  } else if (lines.length === maxLines && i < words.length) {
    lines[maxLines-1] = lines[maxLines-1].replace(/...$/, '') + '\u2026';
  }
  return lines;
}

function drawFrostedQuoteCard(ctx, quote, x, y, w, G, maxY, starCount, starColor) {
  if (!quote) return y;
  var fontSize = G * 0.88; // ~11px — compact
  var lineH = G * 1.4;
  ctx.font = 'italic ' + fontSize + 'px -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif';
  var lines = wrapText(ctx, quote, w - G*3.5, 3);
  var cardH = lines.length * lineH + G * 2 + (starCount ? G * 1.2 : 0);
  // Hard ceiling — never draw past maxY
  if (maxY && y + cardH > maxY) return y;
  // Light frosted glass panel
  roundRect(ctx, x, y, w, cardH, G * 0.6);
  ctx.fillStyle = 'rgba(255,255,255,0.30)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.50)'; ctx.lineWidth = 1; ctx.stroke();
  // Clip to card bounds so nothing overflows
  ctx.save(); roundRect(ctx, x, y, w, cardH, G * 0.6); ctx.clip();
  // Decorative quote mark
  ctx.fillStyle = 'rgba(30,30,50,0.06)';
  ctx.font = '700 ' + (G * 2) + 'px Georgia, "Times New Roman", serif';
  ctx.fillText('\u201C', x + G * 0.5, y + G * 0.2);
  // Quote text
  ctx.fillStyle = 'rgba(30,30,50,0.55)';
  ctx.font = 'italic ' + fontSize + 'px -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif';
  for (var k=0; k<lines.length; k++) {
    ctx.fillText(lines[k], x + G * 2.2, y + G * 1.4 + k * lineH);
  }
  // Star rating for this review
  if (starCount) {
    var ratingY = y + G * 1.4 + lines.length * lineH + G * 0.3;
    ctx.fillStyle = starColor || 'rgba(30,30,50,0.3)';
    ctx.font = (G * 0.7) + 'px ' + '-apple-system, "SF Pro Display", "Helvetica Neue", sans-serif';
    ctx.textAlign = 'left';
    var starStr = '';
    for (var si = 0; si < starCount; si++) starStr += '\u2605';
    ctx.fillText(starStr, x + G * 2.2, ratingY);
    ctx.textAlign = 'left'; // reset
  }
  ctx.restore();
  return y + cardH + G * 0.6;
}

function createBackTexture(movie) {
  var canvas = document.createElement('canvas');
  canvas.width = CANVAS_W; canvas.height = CANVAS_H;
  var ctx = canvas.getContext('2d');
  var cr = 20;
  // G = 8px grid unit scaled to texture
  var G = Math.round(8 * TEXTURE_SCALE);
  var P = G * 3; // 24px padding
  var W = CANVAS_W - P * 2;
  var FONT = '-apple-system, "SF Pro Display", "Helvetica Neue", sans-serif';

  ctx.save();
  ctx.translate(CANVAS_W, 0); ctx.scale(-1, 1);
  roundRect(ctx, 0, 0, CANVAS_W, CANVAS_H, cr); ctx.clip();

  // === BG: LIGHT FROSTED GLASS — luminous panel on dark scene ===
  // Layer 1: solid light cool-gray base
  ctx.fillStyle = 'rgb(205, 208, 220)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  // Layer 2: warm radial glow — top center for depth
  var glow1 = ctx.createRadialGradient(CANVAS_W*0.5, CANVAS_H*0.15, 0, CANVAS_W*0.5, CANVAS_H*0.3, CANVAS_H*0.7);
  glow1.addColorStop(0, 'rgba(230,225,240,0.6)'); glow1.addColorStop(1, 'rgba(200,202,215,0)');
  ctx.fillStyle = glow1; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  // Layer 3: cool accent — bottom edge
  var glow2 = ctx.createRadialGradient(CANVAS_W*0.5, CANVAS_H*0.95, 0, CANVAS_W*0.5, CANVAS_H*0.8, CANVAS_H*0.4);
  glow2.addColorStop(0, 'rgba(190,200,225,0.4)'); glow2.addColorStop(1, 'rgba(200,202,215,0)');
  ctx.fillStyle = glow2; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  // Layer 4: frosted noise texture — tiny scattered dots
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  for (var ni=0; ni<120; ni++) {
    var nx = Math.random() * CANVAS_W, ny = Math.random() * CANVAS_H;
    ctx.beginPath(); ctx.arc(nx, ny, Math.random()*2+0.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = 'rgba(180,180,200,0.06)';
  for (var ni2=0; ni2<80; ni2++) {
    var nx2 = Math.random() * CANVAS_W, ny2 = Math.random() * CANVAS_H;
    ctx.beginPath(); ctx.arc(nx2, ny2, Math.random()*1.5+0.5, 0, Math.PI*2); ctx.fill();
  }

  var y = P;

  // === TITLE — largest element, bold (visual hierarchy level 1) ===
  ctx.fillStyle = '#1a1a2e';
  ctx.font = '700 ' + (G * 2.5) + 'px ' + FONT;
  ctx.textBaseline = 'top';
  var t = movie.title;
  while (ctx.measureText(t).width > W && t.length > 8) t = t.slice(0,-1);
  if (t !== movie.title) t += '\u2026';
  ctx.fillText(t, P, y);
  y += G * 4; // 32px below title

  // === SUBGENRE PILL ===
  var tier = tiers.find(function(x){return x.key===movie.tier;});
  var genre = tier ? tier.label : '';
  if (genre) {
    ctx.font = '600 ' + (G * 1.1) + 'px ' + FONT;
    var pillText = genre.toUpperCase();
    var gw = ctx.measureText(pillText).width + G * 2;
    var gh = G * 2.5;
    roundRect(ctx, P, y, gw, gh, gh/2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.40)'; ctx.lineWidth = 0.5; ctx.stroke();
    ctx.fillStyle = 'rgba(30,30,50,0.55)';
    ctx.fillText(pillText, P + G, y + G * 0.7);
    y += gh + G * 1.5;
  }

  // === SYNOPSIS — level 3 hierarchy, 5 lines max ===
  ctx.fillStyle = 'rgba(30,30,50,0.55)';
  ctx.font = '400 ' + (G * 1.4) + 'px ' + FONT;
  var synLines = wrapText(ctx, movie.synopsis, W, 5);
  var synLH = G * 2.3;
  for (var si=0; si<synLines.length; si++) {
    ctx.fillText(synLines[si], P, y); y += synLH;
  }
  y += G * 1.5;

  // === THIN DIVIDER ===
  ctx.strokeStyle = 'rgba(30,30,50,0.08)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(P, y); ctx.lineTo(P+W, y); ctx.stroke();
  y += G * 1.5;

  // === TWO FROSTED GLASS QUOTE CARDS ===
  var q1Text = movie.q1 || '';
  var q5Text = movie.q5 || '';
  if (q5Text === q1Text) q5Text = '';
  var bottomPinY = CANVAS_H - G * 13; // hard ceiling — nothing above this bleeds into stars
  if (q1Text) {
    y = drawFrostedQuoteCard(ctx, q1Text, P, y, W, G, bottomPinY, 1, '#ef4444');
  }
  if (q5Text) {
    y = drawFrostedQuoteCard(ctx, q5Text, P, y, W, G, bottomPinY, 5, '#22c55e');
  }

  // === BOTTOM SECTION — pinned, 8px grid aligned ===

  // 5 INTERACTIVE STARS — centered
  var starY = CANVAS_H - G * 12;
  var uR = ratings[movie.id] || 0;
  var starFontSize = G * 2.75;
  var starGap = G * 1.2;
  var starsW = 5 * starFontSize + 4 * starGap;
  var starX = (CANVAS_W - starsW) / 2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (var s=0; s<5; s++) {
    var sx = starX + s * (starFontSize + starGap) + starFontSize/2;
    ctx.font = starFontSize + 'px ' + FONT;
    if (s < uR) {
      ctx.fillStyle = '#b8860b';
      ctx.fillText('\u2605', sx, starY);
    } else {
      ctx.fillStyle = 'rgba(30,30,50,0.15)';
      ctx.fillText('\u2606', sx, starY);
    }
  }

  // 3 CIRCULAR ACTION BUTTONS — 44px touch targets (G*5.5), centered row
  var btnY = CANVAS_H - G * 7;
  var btnR = G * 2.2; // Slightly smaller for 4 buttons
  var btnGap = G * 1.8;
  var btns = [
    {ch:'\u2665', label:'Max', c:'#e05060', bg:'rgba(224,80,96,0.12)', border:'rgba(224,80,96,0.25)'},
    {ch:'\u2665', label:'Like', c:'#c0384a', bg:'rgba(192,56,74,0.10)', border:'rgba(192,56,74,0.25)'},
    {ch:'\u2606', label:'Save', c:'#9a7b2a', bg:'rgba(154,123,42,0.10)', border:'rgba(154,123,42,0.20)'},
    {ch:'\u2715', label:'DNF',  c:'rgba(30,30,50,0.40)', bg:'rgba(30,30,50,0.05)', border:'rgba(30,30,50,0.12)'}
  ];
  var totalBtnW = btns.length * btnR*2 + (btns.length-1) * btnGap;
  var btnStartX = (CANVAS_W - totalBtnW) / 2 + btnR;
  for (var b=0; b<btns.length; b++) {
    var bx = btnStartX + b * (btnR*2 + btnGap);
    // Frosted glass circle
    ctx.beginPath(); ctx.arc(bx, btnY, btnR, 0, Math.PI*2);
    ctx.fillStyle = btns[b].bg; ctx.fill();
    ctx.strokeStyle = btns[b].border; ctx.lineWidth = 1; ctx.stroke();
    // Icon
    ctx.fillStyle = btns[b].c;
    ctx.font = (G * 2) + 'px ' + FONT;
    ctx.fillText(btns[b].ch, bx, btnY);
    // Label
    ctx.fillStyle = 'rgba(30,30,50,0.30)';
    ctx.font = '500 ' + (G * 1) + 'px ' + FONT;
    ctx.fillText(btns[b].label, bx, btnY + btnR + G * 1.2);
  }

  // STREAMING ROW — very bottom, centered
  var stY = CANVAS_H - G * 1.5;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  var stArr = movie.streaming || [];
  ctx.font = '600 ' + (G * 1.1) + 'px ' + FONT;
  var totalStW = 0;
  stArr.forEach(function(name) { totalStW += G + ctx.measureText(name).width + G * 1.5; });
  var stX = (CANVAS_W - totalStW) / 2;
  stArr.forEach(function(name) {
    ctx.beginPath(); ctx.arc(stX + G*0.4, stY, G*0.4, 0, Math.PI*2);
    ctx.fillStyle = streamColors[name]||'#555'; ctx.fill();
    ctx.fillStyle = 'rgba(30,30,50,0.40)';
    ctx.font = '600 ' + (G * 1.1) + 'px ' + FONT;
    ctx.fillText(name, stX + G, stY);
    stX += G + ctx.measureText(name).width + G * 1.5;
  });

  // Outer border — subtle white glow
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5;
  roundRect(ctx, 1, 1, CANVAS_W-2, CANVAS_H-2, cr); ctx.stroke();

  ctx.restore();
  return new THREE.CanvasTexture(canvas);
}

// === BUILD / REBUILD WHEEL — ALWAYS 9 SLOTS ===
function rebuildWheel() {
  var mount = document.getElementById('mount');

  if (!renderer) {
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    mount.appendChild(renderer.domElement);
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x07060b);
    window.addEventListener('resize', function() {
      if (!camera) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  // Cleanup old
  if (group) {
    scene.remove(group);
    meshes.forEach(function(m) { m.geometry.dispose(); m.material.dispose(); });
  }
  meshes = []; group = new THREE.Group();

  if (!filtered.length) { scene.add(group); updateCounter(); return; }

  // === DERIVED VALUES — ALWAYS 9 SLOTS (verbatim from v2 prototype) ===
  NUM_TILES = WHEEL_SLOTS;
  ANGLE_STEP = (Math.PI * 2) / NUM_TILES;
  var gapRad = ARC_GAP_DEG * Math.PI / 180;
  RADIUS = Math.round((PLANE_H / 2) / Math.sin((ANGLE_STEP - gapRad) / 2));
  var frontAngularH = 2 * Math.atan((PLANE_H / 2) / RADIUS) * (180 / Math.PI);
  FOV = Math.round(frontAngularH / COVERAGE * 1.15); // 15% wider to show more curvature

  camera = new THREE.PerspectiveCamera(FOV, window.innerWidth / window.innerHeight, 1, 5000);
  camera.position.set(0, 0, 0);
  camera.lookAt(0, 0, -RADIUS);

  // === BUILD 9 TILE SLOTS (geometry verbatim from v2) ===
  for (var i = 0; i < NUM_TILES; i++) {
    var geo = new THREE.PlaneGeometry(PLANE_W, PLANE_H);
    var mat = new THREE.MeshBasicMaterial({ color: 0x111118, side: THREE.DoubleSide, transparent: true, opacity: 1.0 });
    var mesh = new THREE.Mesh(geo, mat);
    // Position on cylinder (verbatim from v2)
    mesh.position.set(0, Math.sin(i * ANGLE_STEP) * RADIUS, -Math.cos(i * ANGLE_STEP) * RADIUS);
    mesh.rotation.x = i * ANGLE_STEP;
    mesh.userData = { slotIdx: i, flipped: false, frontTex: null, backTex: null, movieIdx: -1 };
    group.add(mesh);
    meshes.push(mesh);
  }

  // Restore genre scroll position
  var saved = genreScrollMemory[curTier];
  listIdx = (saved !== undefined) ? saved : 0;

  // Load textures for initial window
  loadWindowTextures();

  // Wheel always starts at rotation 0 (slot 0 = center)
  group.rotation.x = 0;

  scene.add(group);
  isAnimating = false; isFlipping = false;
  updateCounter();
}

// === SLIDING WINDOW — map filtered list onto 9 wheel slots ===
function getWindowMovie(slotOffset) {
  // slotOffset: 0=center, 1=next, -1=prev, etc.
  // Maps to filtered list with wrapping
  var fi = ((listIdx + slotOffset) % filtered.length + filtered.length) % filtered.length;
  return { movie: filtered[fi], filteredIdx: fi };
}

function loadWindowTextures() {
  if (!filtered.length) return;
  // Slot 0 = center movie (listIdx)
  // Slot 1 = listIdx+1, Slot 2 = listIdx+2, ...
  // Slot 8 = listIdx-1 (wraps around the 9-slot ring)
  var half = Math.floor(NUM_TILES / 2);
  for (var i = 0; i < NUM_TILES; i++) {
    var offset = i <= half ? i : i - NUM_TILES; // 0,1,2,3,4,-4,-3,-2,-1
    var w = getWindowMovie(offset);
    var mesh = meshes[i];
    mesh.userData.movieIdx = w.filteredIdx;
    mesh.userData.flipped = false;
    mesh.userData.backTex = null;
    mesh.rotation.y = 0;
    // Load poster
    (function(m, movie) {
      createPosterTexture(movie, function(tex) {
        m.userData.frontTex = tex;
        m.material.map = tex;
        m.material.color.set(0xffffff);
        m.material.needsUpdate = true;
      });
    })(mesh, w.movie);
  }
}

// === OPACITY FALLOFF (verbatim from v2) ===
function updateOpacity() {
  if (!meshes || !meshes.length) return;
  var TWO_PI = Math.PI * 2;
  for (var i = 0; i < NUM_TILES; i++) {
    var a = (i * ANGLE_STEP + group.rotation.x) % TWO_PI;
    if (a < 0) a += TWO_PI;
    var facing = Math.cos(a);
    var t = Math.max(0, (facing + 1) / 2);
    meshes[i].material.opacity = 0.03 + Math.pow(t, 2.2) * 0.97;
  }
}

function updateCounter() {
  idx = listIdx;
  var centerMovie = meshes[getCenterSlot()] ? meshes[getCenterSlot()].userData.movieIdx : listIdx;
  document.getElementById('counter').textContent = filtered.length ? (listIdx + 1) + ' / ' + filtered.length : '0';
}

// === SNAP NAVIGATION — rotate one slot, swap ONLY the hidden backside tile ===
function navigateWheel(dir) {
  // dir: +1 = next (swipe up), -1 = prev (swipe down)
  if (isAnimating || !filtered.length) return;
  isAnimating = true;

  // If center is flipped, flip back instantly
  var centerSlot = getCenterSlot();
  var centerMesh = meshes[centerSlot];
  if (centerMesh && centerMesh.userData.flipped) {
    centerMesh.userData.flipped = false;
    if (centerMesh.userData.frontTex) { centerMesh.material.map = centerMesh.userData.frontTex; centerMesh.material.needsUpdate = true; }
    centerMesh.rotation.y = 0;
    hideBackOverlay();
  }

  // Positive rotation = tiles from below rise up (swipe up = next)
  var targetRot = group.rotation.x + dir * ANGLE_STEP;

  gsap.to(group.rotation, {
    x: targetRot,
    duration: 0.4,
    ease: 'back.out(1.7)',
    overwrite: true,

    onComplete: function() {
      // Update list position
      listIdx = ((listIdx + dir) % filtered.length + filtered.length) % filtered.length;

      // Only swap the tile that just went to the FAR BACK of the cylinder.
      // When moving forward (dir=+1), the tile that was behind center (dir's tail)
      // is now the furthest back — replace it with the new edge movie.
      var half = Math.floor(NUM_TILES / 2);
      var newCenterSlot = getCenterSlot();
      // The tail slot (opposite side of where we're heading)
      var tailSlot = (newCenterSlot + (dir > 0 ? half : -half) + NUM_TILES) % NUM_TILES;

      // SAFETY: Only swap if the tail tile is truly hidden (facing away from camera)
      var TWO_PI = Math.PI * 2;
      var tailAngle = (tailSlot * ANGLE_STEP + group.rotation.x) % TWO_PI;
      if (tailAngle < 0) tailAngle += TWO_PI;
      var tailFacing = Math.cos(tailAngle);

      // Only swap if tile is behind the cylinder (facing < -0.3 = well hidden)
      if (tailFacing < -0.3) {
        var tailOffset = dir > 0 ? half : -half;
        var tailMovieIdx = ((listIdx + tailOffset) % filtered.length + filtered.length) % filtered.length;
        var mesh = meshes[tailSlot];
        mesh.userData.movieIdx = tailMovieIdx;
        mesh.userData.flipped = false;
        mesh.userData.backTex = null;
        mesh.rotation.y = 0;
        (function(m, movie) {
          createPosterTexture(movie, function(tex) {
            m.userData.frontTex = tex;
            m.material.map = tex;
            m.material.color.set(0xffffff);
            m.material.needsUpdate = true;
          });
        })(mesh, filtered[tailMovieIdx]);
      }

      isAnimating = false;
      updateCounter();
    }
  });

  // Optimistic counter update
  var nextIdx = ((listIdx + dir) % filtered.length + filtered.length) % filtered.length;
  document.getElementById('counter').textContent = (nextIdx + 1) + ' / ' + filtered.length;
}

// Get which slot index is currently at center (facing camera)
function getCenterSlot() {
  var TWO_PI = Math.PI * 2;
  var bestSlot = 0, bestFacing = -2;
  for (var i = 0; i < NUM_TILES; i++) {
    var a = (i * ANGLE_STEP + group.rotation.x) % TWO_PI;
    if (a < 0) a += TWO_PI;
    var facing = Math.cos(a);
    if (facing > bestFacing) { bestFacing = facing; bestSlot = i; }
  }
  return bestSlot;
}

// === FLIP CENTER TILE — GSAP timeline with midpoint texture swap ===
function flipCenterTile() {
  if (isFlipping || isAnimating) return;
  var mesh = meshes[getCenterSlot()];
  if (!mesh) return;
  isFlipping = true;
  var wasFlipped = mesh.userData.flipped;
  if (!wasFlipped && !mesh.userData.backTex) {
    mesh.userData.backTex = createBackTexture(filtered[listIdx]);
  }
  var targetTex = wasFlipped ? mesh.userData.frontTex : mesh.userData.backTex;
  var tl = gsap.timeline({ onComplete: function() {
    mesh.userData.flipped = !wasFlipped;
    isFlipping = false;
    if (!wasFlipped) showBackOverlay(); else hideBackOverlay();
  }});
  tl.to(mesh.rotation, { y: Math.PI/2, duration: 0.2, ease: 'power2.in'})
    .call(function() { mesh.material.map = targetTex; mesh.material.needsUpdate = true; })
    .to(mesh.rotation, { y: wasFlipped ? 0 : Math.PI, duration: 0.2, ease: 'power2.out'});
}

// === ANIMATION LOOP (render only, no velocity) ===
function animate() {
  requestAnimationFrame(animate);
  updateOpacity();
  if (renderer && scene && camera) renderer.render(scene, camera);
}
animate();

// === BACK TILE OVERLAY — interactive buttons ===
var backOverlay = document.getElementById('backOverlay');
function buildBackOverlay() {
  backOverlay.innerHTML = '';
  // Star rating row
  var starRow = document.createElement('div');
  starRow.className = 'overlay-stars';
  for (var i = 1; i <= 5; i++) {
    var star = document.createElement('button');
    star.className = 'overlay-star';
    star.textContent = '\u2606';
    star.dataset.val = i;
    star.addEventListener('click', function(e) {
      e.stopPropagation();
      var val = parseInt(this.dataset.val);
      var movie = filtered[listIdx];
      if (movie) {
        ratings[movie.id] = (ratings[movie.id] === val) ? 0 : val;
        updateOverlayStars();
        // Rebuild back texture with new rating
        var mesh = meshes[getCenterSlot()];
        if (mesh) { mesh.userData.backTex = createBackTexture(movie); mesh.material.map = mesh.userData.backTex; mesh.material.needsUpdate = true; }
      }
    });
    starRow.appendChild(star);
  }
  backOverlay.appendChild(starRow);
  // Action buttons row
  var btnRow = document.createElement('div');
  btnRow.className = 'overlay-btns';
  var btns = [
    {cls:'maxlike', icon:'\u2665', label:'Max', action:'maxlike'},
    {cls:'like', icon:'\u2665', label:'Like', action:'like'},
    {cls:'save', icon:'\u2606', label:'Save', action:'save'},
    {cls:'dnf', icon:'\u2715', label:'DNF', action:'dnf'}
  ];
  btns.forEach(function(b) {
    var btn = document.createElement('button');
    btn.className = 'overlay-btn ' + b.cls;
    var iconSpan = document.createElement('span');
    iconSpan.textContent = b.icon;
    var labelSpan = document.createElement('span');
    labelSpan.className = 'overlay-btn-label';
    labelSpan.textContent = b.label;
    btn.appendChild(iconSpan);
    btn.appendChild(labelSpan);
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      handleBackAction(b.action);
    });
    btnRow.appendChild(btn);
  });
  backOverlay.appendChild(btnRow);
}
buildBackOverlay();

function updateOverlayStars() {
  var movie = filtered[listIdx];
  var uR = movie ? (ratings[movie.id] || 0) : 0;
  var stars = backOverlay.querySelectorAll('.overlay-star');
  stars.forEach(function(s, i) {
    s.textContent = (i < uR) ? '\u2605' : '\u2606';
    s.className = 'overlay-star' + (i < uR ? ' filled' : '');
  });
}

function showBackOverlay() {
  updateOverlayStars();
  backOverlay.classList.add('active');
}
function hideBackOverlay() {
  backOverlay.classList.remove('active');
}

function handleBackAction(action) {
  var m = filtered[listIdx];
  if (!m) return;
  if (action === 'maxlike') {
    if (!watchlistArr.find(function(x){return x.id===m.id;})) watchlistArr.push(m);
    showToast('\u2665\u2665', 'Max Like!');
  } else if (action === 'like') {
    if (!historyArr.find(function(x){return x.id===m.id;})) historyArr.push(m);
    showToast('\u2665', 'Liked');
  } else if (action === 'save') {
    if (!watchlistArr.find(function(x){return x.id===m.id;})) watchlistArr.push(m);
    showToast('\u2606', 'Saved');
  } else if (action === 'dnf') {
    showToast('\u2715', 'DNF');
    flipCenterTile();
    setTimeout(function() {
      filtered = filtered.filter(function(f){return f.id!==m.id;});
      if (listIdx >= filtered.length) listIdx = 0;
      rebuildWheel();
    }, 450);
    return;
  }
  // Flip back after action (except DNF which already flips)
  flipCenterTile();
  setTimeout(function() { navigateWheel(1); }, 450);
}

// === SWIPE / TAP DETECTION ===
var startY = 0, startX = 0, startTime = 0;
var pointerOnMount = false; // Track if the gesture started on mount
var mount = document.getElementById('mount');

function onPointerDown(x, y) {
  if (isAnimating) return;
  pointerOnMount = true;
  startX = x; startY = y; startTime = performance.now();
}
function onPointerUp(x, y) {
  if (!pointerOnMount) return; // Ignore if gesture didn't start on mount
  pointerOnMount = false;
  if (isAnimating && !isFlipping) return;
  var dx = x - startX, dy = startY - y;
  var dt = performance.now() - startTime;
  var adx = Math.abs(dx), ady = Math.abs(dy);
  // Tap
  if (adx < 12 && ady < 12 && dt < 400) { flipCenterTile(); return; }
  // Horizontal swipe = action
  if (adx > ady && adx > 50) {
    if (dx > 0) swipeAction('watched'); else swipeAction('dnf');
    return;
  }
  // Vertical swipe = navigate
  if (ady > 40) { navigateWheel(dy > 0 ? 1 : -1); }
}

mount.addEventListener('mousedown', function(e) { e.preventDefault(); onPointerDown(e.clientX, e.clientY); });
window.addEventListener('mouseup', function(e) { onPointerUp(e.clientX, e.clientY); });
mount.addEventListener('touchstart', function(e) { var t=e.touches[0]; onPointerDown(t.clientX, t.clientY); }, {passive:true});
mount.addEventListener('touchend', function(e) { var t=e.changedTouches[0]; onPointerUp(t.clientX, t.clientY); }, {passive:true});

// Wheel: one tick = one tile
var wheelLock = false;
mount.addEventListener('wheel', function(e) {
  e.preventDefault();
  if (wheelLock) return;
  if (Math.abs(e.deltaY) > 15) {
    wheelLock = true;
    navigateWheel(e.deltaY > 0 ? 1 : -1);
    setTimeout(function() { wheelLock = false; }, 450);
  }
}, {passive:false});

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowUp') { e.preventDefault(); navigateWheel(-1); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); navigateWheel(1); }
  else if (e.key === 'ArrowRight') swipeAction('watched');
  else if (e.key === 'ArrowLeft') swipeAction('dnf');
  else if (e.key === ' ') { e.preventDefault(); flipCenterTile(); }
});

// === TOAST ===
function showToast(icon, text) {
  var el = document.getElementById('gestureToast');
  el.textContent = '';
  var sp = document.createElement('span'); sp.className='toast-icon'; sp.textContent=icon;
  el.appendChild(sp); el.appendChild(document.createTextNode(text));
  el.className = 'gesture-toast show';
  clearTimeout(el._timer);
  el._timer = setTimeout(function() { el.className='gesture-toast hide'; }, 900);
}

// === SWIPE ACTIONS ===
function swipeAction(action) {
  if (isAnimating || !filtered.length) return;
  var m = filtered[listIdx];
  if (!m) return;
  var icon='', label='', list=null;
  if (action==='watched') { icon='\u2713'; label='Watched'; list=historyArr; }
  else if (action==='dnf') { icon='\u2715'; label='DNF'; list=dnfArr; }
  else if (action==='save') { icon='\u2605'; label='Saved'; list=watchlistArr; }
  if (list && !list.find(function(x){return x.id===m.id;})) list.push(m);
  showToast(icon, label);
  if (action==='dnf') {
    filtered = filtered.filter(function(f){return f.id!==m.id;});
    if (listIdx >= filtered.length) listIdx = 0;
    rebuildWheel();
  } else {
    navigateWheel(1);
  }
}

// === SHUFFLE — slot-machine spin with clean snap (guarded against double-fire) ===
var isShuffling = false;
document.getElementById('shuffleBtn').addEventListener('click', function() {
  if (!filtered.length || isAnimating || isShuffling) return;
  isAnimating = true;
  isShuffling = true;
  var target = Math.floor(Math.random() * filtered.length);
  var startX = group.rotation.x;

  // Spin must land on an exact ANGLE_STEP multiple for clean snap
  // 5-7 full revolutions worth of tile steps
  var minSteps = NUM_TILES * 5;
  var maxSteps = NUM_TILES * 7;
  var totalSteps = minSteps + Math.floor(Math.random() * (maxSteps - minSteps));
  var totalSpin = totalSteps * ANGLE_STEP;

  gsap.killTweensOf(group.rotation);

  gsap.to(group.rotation, {
    x: startX + totalSpin,
    duration: 1.4,
    ease: 'expo.out',
    overwrite: 'all',
    onComplete: function() {
      // Snap: reset to clean position, reload textures for target movie
      listIdx = target;
      group.rotation.x = 0;
      loadWindowTextures();
      updateCounter();
      setTimeout(function() { isAnimating = false; isShuffling = false; }, 400);
    }
  });
});

// === INTRO ===
(function() {
  var wf = document.getElementById('waveform');
  for (var i=0; i<28; i++) {
    var bar = document.createElement('div'); bar.className='waveform-bar';
    var center = Math.abs(i-14)/14;
    bar.style.setProperty('--bar-h', Math.round(8+(1-center)*20+Math.random()*6)+'px');
    bar.style.animationDelay = (i*0.04+Math.random()*0.15)+'s';
    bar.style.animationDuration = (0.5+Math.random()*0.5)+'s';
    wf.appendChild(bar);
  }
  var audio = document.getElementById('introAudio');
  audio.src = 'intro.mp3'; audio.volume = 0.8;
  var p = audio.play(); if (p) p.catch(function(){});
  setTimeout(function() {
    var intro = document.getElementById('introScreen');
    intro.classList.add('fade-out');
    setTimeout(function() { intro.remove(); }, 800);
  }, 3200);
})();

// === INIT ===
filterAndRebuild();
</script>
