<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sealed In — Vertical Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root {
  --void: #f2f0ed;
  --surface: #ffffff;
  --surface-2: #f7f6f4;
  --surface-3: #eceae6;
  --text: #1a1a1a;
  --text-dim: #5c5c5c;
  --text-muted: #9a9a9a;
  --accent: #8b6914;
  --accent-dim: rgba(139,105,20,0.08);
  --danger-soft: rgba(200,50,50,0.05);
  --danger-border: rgba(200,50,50,0.18);
  --success-soft: rgba(40,160,80,0.05);
  --success-border: rgba(40,160,80,0.18);
  --radius: 14px;
  --radius-lg: 18px;
  --radius-pill: 100px;
  --ease: cubic-bezier(0.25, 1, 0.5, 1);
  --ease-dramatic: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
body {
  background: var(--void);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  width: 100vw;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* Three.js canvas — removed per revision, clean bg only */
#scene-canvas { display: none; }
.grain { display: none; }

/* App shell */
.app {
  position: relative;
  z-index: 1;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  padding: 20px 24px 0;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.header h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
  line-height: 1;
}
.header .sub {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-muted);
  margin-top: 5px;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}

/* Category pills */
.cat-nav {
  display: flex;
  gap: 6px;
  padding: 14px 24px 10px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.cat-nav::-webkit-scrollbar { display: none; }
.cat-pill {
  white-space: nowrap;
  padding: 7px 16px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3px;
  background: var(--surface);
  color: var(--text-muted);
  border: 1px solid rgba(0,0,0,0.06);
  cursor: pointer;
  transition: all 250ms var(--ease);
  flex-shrink: 0;
  min-height: 32px;
  display: flex;
  align-items: center;
  font-family: inherit;
}
.cat-pill.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: rgba(201,168,124,0.2);
}

/* Carousel area — deep perspective for orbital motion */
.carousel-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 900px;
  perspective-origin: 50% 50%;
}

/* Carousel wrapper — single tile view */
.carousel {
  position: relative;
  width: 82%;
  max-width: 330px;
  aspect-ratio: 2/3;
  transform-style: preserve-3d;
}

/* Individual tile — PHYSICAL SLAB with real 3D thickness */
.tile {
  position: absolute;
  width: 100%;
  height: 100%;
  left: 0;
  top: 0;
  transform-style: preserve-3d;
  cursor: pointer;
  will-change: transform;
  /* Resting state: 3D tilt showing slab dimensionality */
  transform: rotateX(3deg) rotateY(-1.5deg) translateZ(0px);
}
.tile.flipped .tile-inner {
  transform: rotateY(180deg);
}
.tile-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 500ms var(--ease-dramatic);
}

/* Front face — THICK PHYSICAL SLAB with real 3D edge geometry */
.tile-front {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
  /* Real CSS 3D: push the front face forward to create slab thickness */
  transform: translateZ(30px);
  /* Layered shadow cascade: contact → spread → ambient → far diffuse */
  box-shadow:
    0 3px 6px rgba(0,0,0,0.18),
    0 8px 16px rgba(0,0,0,0.14),
    0 20px 40px rgba(0,0,0,0.16),
    0 44px 72px rgba(0,0,0,0.12),
    0 72px 100px rgba(0,0,0,0.07);
}

/* Slab edge faces — real 3D geometry connecting front face (Z=30) to back
   Each face is positioned at its edge, then rotated 90° to form a perpendicular wall */
.slab-bottom {
  position: absolute;
  left: 0; right: 0;
  height: 60px;
  bottom: 0;
  background: linear-gradient(to bottom, #d0ccc6 0%, #b8b4ae 25%, #9a968f 60%, #807c76 100%);
  border-radius: 0 0 var(--radius) var(--radius);
  transform-origin: top center;
  transform: translateZ(30px) rotateX(-90deg);
  backface-visibility: hidden;
}
.slab-right {
  position: absolute;
  top: 0; bottom: 0;
  right: 0;
  width: 60px;
  background: linear-gradient(to right, #ccc8c2 0%, #b4b0aa 25%, #969288 60%, #7e7a74 100%);
  border-radius: 0 var(--radius) var(--radius) 0;
  transform-origin: left center;
  transform: translateZ(30px) rotateY(90deg);
  backface-visibility: hidden;
}
.slab-left {
  position: absolute;
  top: 0; bottom: 0;
  left: 0;
  width: 60px;
  background: linear-gradient(to left, #ccc8c2 0%, #b4b0aa 25%, #969288 60%, #7e7a74 100%);
  border-radius: var(--radius) 0 0 var(--radius);
  transform-origin: right center;
  transform: translateZ(30px) rotateY(-90deg);
  backface-visibility: hidden;
}
.slab-top {
  position: absolute;
  left: 0; right: 0;
  height: 60px;
  top: 0;
  background: linear-gradient(to top, #e0dcd6 0%, #ccc8c2 25%, #b4b0aa 60%, #a8a49e 100%);
  border-radius: var(--radius) var(--radius) 0 0;
  transform-origin: bottom center;
  transform: translateZ(30px) rotateX(90deg);
  backface-visibility: hidden;
}
/* Inner top-left highlight — light catch on physical edge */
.tile-front::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: rgba(255,255,255,0.15);
  pointer-events: none;
  z-index: 10;
}
.tile-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  /* PURE poster art — no filters, no overlays, no opacity changes */
}

/* Title block removed — poster art has titles built in */

/* Back face — MATTE light finish, matching slab depth */
.tile-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  transform: rotateY(180deg) translateZ(30px);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow:
    0 1px 2px rgba(0,0,0,0.1),
    0 4px 8px rgba(0,0,0,0.08),
    0 12px 28px rgba(0,0,0,0.1),
    0 28px 56px rgba(0,0,0,0.08),
    0 56px 80px rgba(0,0,0,0.05);
  overflow: hidden;
  padding: 18px 18px;
  -webkit-overflow-scrolling: touch;
  background-image: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
  display: flex;
  flex-direction: column;
}

.back-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 3px;
}
.back-meta {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.lb-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  background: var(--accent-dim);
  font-size: 10px;
  color: var(--accent);
  font-weight: 600;
}
.back-synopsis {
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-dim);
  margin-bottom: 12px;
}

/* Quotes */
.quote-block { margin-bottom: 12px; flex-shrink: 0; }
.quote {
  padding: 8px 11px;
  border-radius: 8px;
  font-size: 11px;
  line-height: 1.5;
  font-style: italic;
  margin-bottom: 5px;
  color: var(--text-dim);
}
.q1 { background: var(--danger-soft); border-left: 2px solid var(--danger-border); }
.q5 { background: var(--success-soft); border-left: 2px solid var(--success-border); }

/* Section labels */
.section-lbl {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin-bottom: 6px;
  flex-shrink: 0;
}

/* Stream links */
.stream-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 12px;
  flex-shrink: 0;
}
.stream-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-radius: var(--radius-pill);
  font-size: 10px;
  font-weight: 500;
  background: var(--surface-2);
  color: var(--text-dim);
  text-decoration: none;
  border: 1px solid rgba(0,0,0,0.06);
  transition: all 200ms var(--ease);
  min-height: 26px;
  font-family: inherit;
}
.stream-link:hover {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: rgba(139,105,20,0.15);
}
.stream-link svg { width: 12px; height: 12px; flex-shrink: 0; }

/* Action buttons */
.actions-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 10px;
  flex-shrink: 0;
}
.act-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.06);
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 200ms var(--ease);
  color: var(--text-dim);
  font-family: inherit;
  padding: 0;
}
.act-btn:hover, .act-btn.on {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: rgba(139,105,20,0.15);
  transform: scale(1.06);
}
.act-btn svg { width: 15px; height: 15px; }

/* Stars */
.star-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-shrink: 0;
  margin-top: auto;
}
.star-btn {
  width: 32px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  font-family: inherit;
}
.star-btn svg { width: 18px; height: 18px; color: var(--surface-3); transition: color 150ms ease; }
.star-btn.on svg { color: var(--accent); }

/* Bottom bar */
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 24px 28px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.shuffle-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 16px;
  border-radius: var(--radius-pill);
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  background: var(--surface-2);
  color: var(--text-dim);
  border: 1px solid rgba(0,0,0,0.06);
  cursor: pointer;
  transition: all 250ms var(--ease);
  min-height: 44px;
}
.shuffle-pill:hover {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: rgba(139,105,20,0.15);
}
.shuffle-pill svg { width: 14px; height: 14px; }
.counter-txt {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}
.hint-txt {
  font-size: 9px;
  color: var(--text-muted);
  opacity: 0.5;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Intro screen */
.intro-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #0a0a0a;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s ease;
}
.intro-screen.fade-out {
  opacity: 0;
  pointer-events: none;
}
.intro-content {
  text-align: center;
  max-width: 320px;
  padding: 0 24px;
}
.intro-text {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #e8e6e2;
  letter-spacing: -0.5px;
  line-height: 1.35;
  opacity: 0;
  transform: translateY(12px);
  animation: introTextIn 0.6s ease forwards 0.3s;
}
@keyframes introTextIn {
  to { opacity: 1; transform: translateY(0); }
}
.waveform {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 36px;
  margin-top: 24px;
  opacity: 0;
  animation: introTextIn 0.4s ease forwards 0.7s;
}
.waveform-bar {
  width: 3px;
  border-radius: 2px;
  background: #e8e6e2;
  opacity: 0.5;
  animation: waveformPulse 0.8s ease-in-out infinite alternate;
}
@keyframes waveformPulse {
  0% { height: 4px; opacity: 0.25; }
  100% { height: var(--bar-h, 24px); opacity: 0.7; }
}
</style>
</head>
<body>
<!-- Intro screen -->
<div class="intro-screen" id="introScreen">
  <div class="intro-content">
    <div class="intro-text">The Terror Must Be<br>In English</div>
    <div class="waveform" id="waveform"></div>
  </div>
</div>

<canvas id="scene-canvas"></canvas>
<div class="grain"></div>

<div class="app">
  <div class="header">
    <h1>Sealed In</h1>
    <div class="sub">Deep cuts &middot; The Divide universe</div>
  </div>
  <div class="cat-nav" id="catNav"></div>
  <div class="carousel-area" id="carouselArea">
    <div class="carousel" id="carousel"></div>
  </div>
  <div class="bottom-bar">
    <button class="shuffle-pill" id="shuffleBtn" aria-label="Shuffle movies">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      Shuffle
    </button>
    <span class="hint-txt">swipe up / down</span>
    <span class="counter-txt" id="counter"></span>
  </div>
</div>

<script>
// ============================================
// DATA
// ============================================
const movies = [
{id:1,title:"Right at Your Door",year:2006,director:"Chris Gorak",tier:"direct",poster:"https://image.tmdb.org/t/p/w500/sBkCtdpkWRiisQ3vzyNOZ72biCB.jpg",synopsis:"Dirty bomb hits LA; husband seals himself inside the house while wife is outside. Claustrophobic domestic apocalypse tension.",streaming:["Tubi","Pluto TV"],rating:3.1,q1:"\u2605 \"A marriage stress-test disguised as a low-budget LA panic nightmare, and somehow the marriage loses.\"",q5:"\u2605\u2605\u2605\u2605\u2605 \"Sealed my husband outside during a gas leak once. Didn\u2019t realise this movie was a how-to guide.\""},
{id:2,title:"Hidden",year:2015,director:"Matt Duffer, Ross Duffer",tier:"direct",poster:"https://image.tmdb.org/t/p/w500/mPuaHaczkoJDzlYD9GyXiDjMXig.jpg",synopsis:"Family hiding in a bunker after an outbreak. Pre-Stranger Things Duffer Brothers. Claustrophobic survival with a twist ending.",streaming:["Netflix","Amazon Prime"],rating:3.1,q1:"\u2605 \"The only way this movie should be watched is split into 10 parts with subway surfers covering half the screen.\"",q5:"\u2605\u2605\u2605\u2605\u2605 \"The twist absolutely EATS!!!! i was having a fine time for most of it but when the reveal happens OOHHHHH SUDDENLY ITS ALL WORTH IT\""},
{id:3,title:"Carriers",year:2009,director:"Alex Pastor, David Pastor",tier:"direct",poster:"https://image.tmdb.org/t/p/w500/jxjnjHtHXgvjdhkwpelE9ZwVMg6.jpg",synopsis:"Four survivors navigate a pandemic wasteland with strict rules to avoid infection. Moral decay under survival pressure.",streaming:["Amazon Prime","Tubi"],rating:2.8,q1:"\u2605 \"Could have been called \u2018How To Be An Asshole at The End Of The World\u2019 and saved everyone 84 minutes of their lives.\"",q5:"\u2605\u2605\u2605\u2605\u2605 \"I hate this fucking movie and every god damn thing about it but I\u2019ve watched it four times so make of that what you will.\""},
{id:4,title:"It Comes at Night",year:2017,director:"Trey Edward Shults",tier:"direct",poster:"https://image.tmdb.org/t/p/w500/rNKJpFMlOZn5zkzBPZxEJrQn5Km.jpg",synopsis:"Family boarded up during an unspecified plague. Another family arrives. Trust erodes into paranoia and violence.",streaming:["Netflix","Amazon Prime"],rating:3.1,q1:"\u2605 \"I can\u2019t tell what was worse \u2014 never finding out what comes at night, or the aspect ratio.\"",q5:"\u2605\u2605\u2605\u2605\u2605 \"Anyone else losing their entire fucking mind\""},
{id:5,title:"Await Further Instructions",year:2018,director:"Johnny Kevorkian",tier:"direct",poster:"https://image.tmdb.org/t/p/w500/afvi5tVi5S3Ux9faZaI32SmPRkj.jpg",synopsis:"Family trapped on Christmas Day by a mysterious barricade. TV gives increasingly sinister instructions.",streaming:["Netflix","Shudder"],rating:2.5,q1:"\u2605 \"The writer of this film should be sent to prison. Not metaphorically. Actual prison.\"",q5:"\u2605\u2605\u2605\u2605\u2605 \"A Christmas movie about a racist family being eaten by their television. I will be revisiting this every December.\""},
{id:6,title:"Coherence",year:2013,director:"James Ward Byrkit",tier:"claustrophobic",poster:"https://image.tmdb.org/t/p/w500/ezUtb9m5DeLwL2gxi4gktzNCvQv.jpg",synopsis:"Dinner party goes wrong when a comet passes overhead. Reality fractures. Shot in a single house with improvised dialogue.",streaming:["Amazon Prime","Tubi"],rating:3.7,q1:"\u2605 \"The Blair Witch Project for insufferable yuppies who own too many wine glasses.\"",q5:"\u2605\u2605\u2605\u2605\u2605 \"If there are a million different realities, I have slept with your wife in every single one of them.\""},
{id:7,title:"Pontypool",year:2008,director:"Bruce McDonald",tier:"claustrophobic",poster:"https://image.tmdb.org/t/p/w500/uh4n9FSYYaeOWchP8gBPNtg7kD7.jpg",synopsis:"Radio DJ trapped in his station as a virus spreads through the English language. The horror is in what you hear.",streaming:["Shudder","Tubi"],rating:3.3,q1:"\u2605 \"Hilarious that a film about radio DJs can\u2019t even get the vocals on the right frequency. Truly committed to the bit.\"",q5:"\u2605\u2605\u2605\u2605\u2605 \"What if Night of the Living Dead was a locked-in War of the Worlds radio play starring Kawartha Lakes\u2019 Howard Stern? Perfection.\""},
{id:8,title:"The Platform",year:2019,director:"Galder Gaztelu-Urrutia",tier:"claustrophobic",poster:"https://image.tmdb.org/t/p/w500/iXvQnzy6JCAx1PiQEKXuTY04ZHl.jpg",synopsis:"Vertical prison where food descends level by level. Upper floors feast; lower floors starve. Brutal social allegory.",streaming:["Netflix"],rating:3.4,q1:"\u2605 \"I was with it and then it ended and now I\u2019m mad. I wanted to throw up and I didn\u2019t even get an explanation. So dumb.\"",q5:"\u2605\u2605\u2605\u2605\u2605 \"This is the most fucked up Mukbang I\u2019ve ever seen and I genuinely cannot stop thinking about it.\""},
{id:9,title:"Exam",year:2009,director:"Stuart Hazeldine",tier:"claustrophobic",poster:"https://image.tmdb.org/t/p/w500/i1J2zBCyOQJKsQipqJ0qXERC1Ma.jpg",synopsis:"Eight candidates in a single room for a final job interview. One question, 80 minutes, strict rules.",streaming:["Tubi","Amazon Prime"],rating:3.3,q1:"\u2605 \"Eight people locked in a room fail to ask a question for 90 minutes. Truly the most realistic job interview ever filmed.\"",q5:"\u2605\u2605\u2605\u2605\u2605 \"SAW for people who love riddles and there\u2019s no gore at all, which means it\u2019s somehow more disturbing than SAW.\""},
{id:10,title:"The Bar",year:2017,director:"Alex de la Iglesia",tier:"claustrophobic",poster:"https://image.tmdb.org/t/p/w500/vYyALnKnzHLv4PoU2b447GYT8R9.jpg",synopsis:"Patrons trapped in a Madrid bar after a sniper kills anyone who exits. Paranoia mounts as they turn on each other.",streaming:["Netflix","Amazon Prime"],rating:3.0,q1:"\u2605 \"Starts as a clever absurdist siege thriller and ends as a loud, boring descent into a sewer. Literally.\"",q5:"\u2605\u2605\u2605\u2605\u2605 \"People trapped in a Madrid bar after a shooting. Devolved into full Lord of the Flies within 20 minutes. This is peak cinema.\""},
{id:11,title:"Circle",year:2015,director:"Aaron Hann, Mario Miscione",tier:"survival",poster:"https://image.tmdb.org/t/p/w500/hbIL53MdZFJXsgxXaSOVuApWTs8.jpg",synopsis:"50 strangers in a circle. Every 2 minutes, one dies by group vote. Pure survival psychology.",streaming:["Netflix","Tubi"],rating:2.9,q1:"\u2605 \"50 people slowly eliminate each other with no explanation and I eliminated myself from the couch after 30 minutes.\"",q5:"\u2605\u2605\u2605\u2605\u2605 \"What a shitty prize. You get to live on an earth populated by the orphans, pregnant women, and other assholes humanity voted to keep.\""},

// ============================================
// BOOM ARM ORBITAL TRANSITION
// The tile is on the end of a fixed-radius boom arm.
// It arcs upward along a circular path while always
// facing the viewer (like holding a card overhead).
// At 0° = face-on. At 90° = directly above, face down.
// Y and Z follow the circular path; rotateX = angle.
// ============================================
const ORBIT = {
  exitDur: 0.55,
  enterDur: 0.6,
  radius: 420,       // boom arm length in px
  exitAngle: 130,    // degrees — well past overhead (90°)
  enterAngle: 120,   // degrees — where new tile starts from
};

// Compute boom arm position from angle (degrees)
function boomPos(angleDeg, R, sign) {
  const rad = angleDeg * Math.PI / 180;
  return {
    y: -sign * R * Math.sin(rad),
    z: -R * (1 - Math.cos(rad)),
    rotX: sign * angleDeg,
  };
}

function exitTile(dir, onDone) {
  const tile = document.querySelector('.tile');
  if (!tile) { onDone(); return; }
  gsap.killTweensOf(tile);

  const sign = dir > 0 ? 1 : -1;
  const R = ORBIT.radius;
  const state = { angle: 0 };

  gsap.to(state, {
    angle: ORBIT.exitAngle,
    duration: ORBIT.exitDur,
    // Smooth cinematic ease: slow start, smooth acceleration through the arc
    ease: 'cubic-bezier(0.4, 0.0, 0.7, 1.0)',
    onUpdate: () => {
      const p = boomPos(state.angle, R, sign);
      const progress = state.angle / ORBIT.exitAngle;
      // Smooth opacity: hold full opacity longer, then gentle fade
      const opacity = progress < 0.55 ? 1 : Math.cos((progress - 0.55) / 0.45 * Math.PI * 0.5);
      gsap.set(tile, {
        y: p.y,
        z: p.z,
        rotateX: p.rotX,
        opacity: Math.max(0, opacity),
      });
    },
    onComplete: () => { tile.remove(); onDone(); }
  });
}

function enterTile(fromDir) {
  const tile = document.querySelector('.tile');
  if (!tile) return;

  const sign = fromDir > 0 ? -1 : 1;
  const R = ORBIT.radius;
  const state = { angle: ORBIT.enterAngle };

  gsap.set(tile, { opacity: 0 });

  gsap.to(state, {
    angle: 0,
    duration: ORBIT.enterDur,
    // Smooth deceleration: glides in and settles gently
    ease: 'cubic-bezier(0.0, 0.0, 0.2, 1.0)',
    onUpdate: () => {
      const p = boomPos(state.angle, R, sign);
      const progress = state.angle / ORBIT.enterAngle;
      // Smooth fade-in: gentle appearance as tile sweeps into view
      const opacity = progress > 0.65 ? Math.cos((progress - 0.65) / 0.35 * Math.PI * 0.5) : 1;
      gsap.set(tile, {
        y: p.y,
        z: p.z,
        rotateX: p.rotX,
        opacity: Math.max(0, opacity),
      });
    },
    onComplete: () => {
      gsap.set(tile, { y: 0, z: 0, rotateX: 3, opacity: 1, clearProps: 'filter' });
    }
  });
}

// ============================================
// GESTURE HANDLING — debounced, no jank
// ============================================
let tsy = 0, tst = 0, gestLock = false;
const area = document.getElementById('carouselArea');

function handleSwipe(dy, dt) {
  if (anim || gestLock || !filtered.length) return;
  if (Math.abs(dy) < 40) return; // threshold
  gestLock = true;
  const dir = dy > 0 ? 1 : -1;
  const v = Math.abs(dy) / Math.max(dt, 1);

  if (v > 1.5) {
    const count = Math.min(Math.floor(v * 1.2), filtered.length - 1);
    spinNav(dir, count);
  } else {
    nav(dir);
  }
}

// Touch
area.addEventListener('touchstart', e => {
  if (anim) return;
  tsy = e.touches[0].clientY;
  tst = Date.now();
}, {passive: true});

area.addEventListener('touchend', e => {
  const dy = tsy - e.changedTouches[0].clientY;
  const dt = Date.now() - tst;
  handleSwipe(dy, dt);
}, {passive: true});

// Mouse drag
let mdn = false, msy = 0, mst = 0;
area.addEventListener('mousedown', e => {
  if (anim) return;
  mdn = true; msy = e.clientY; mst = Date.now();
});
window.addEventListener('mouseup', e => {
  if (!mdn) return; mdn = false;
  handleSwipe(msy - e.clientY, Date.now() - mst);
});

// Scroll wheel — debounced to prevent glitch/rapid-fire
let wheelAccum = 0, wheelTimer = null;
area.addEventListener('wheel', e => {
  e.preventDefault();
  if (anim) return;

  wheelAccum += e.deltaY;
  clearTimeout(wheelTimer);
  wheelTimer = setTimeout(() => {
    if (Math.abs(wheelAccum) > 30) {
      const dir = wheelAccum > 0 ? 1 : -1;
      nav(dir);
    }
    wheelAccum = 0;
  }, 80);
}, {passive: false});

// Also prevent scroll glitch on document level
document.addEventListener('wheel', e => {
  if (e.target.closest('.tile-back')) return; // allow back-face scroll
  e.preventDefault();
}, {passive: false});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') nav(-1);
  else if (e.key === 'ArrowDown') nav(1);
  else if (e.key === ' ') {
    e.preventDefault();
    const t = document.querySelector('.tile');
    if (t) t.click();
  }
});

// Single nav: FULL EXIT → tile removed → FULL ENTER (no overlap)
function nav(dir) {
  if (anim || !filtered.length) return;
  anim = true;

  exitTile(dir, () => {
    // Old tile is already removed by exitTile
    idx = (idx + dir + filtered.length) % filtered.length;
    renderTile();
    enterTile(dir);
    // Unlock after enter animation completes
    setTimeout(() => { anim = false; gestLock = false; }, ORBIT.enterDur * 1000 + 50);
  });
}

// Spin through multiple: rapid boom-arm arcs — fast and punchy
function spinNav(dir, count) {
  if (anim || !filtered.length) return;
  anim = true;
  let i = 0;
  const sign = dir > 0 ? 1 : -1;
  const R = ORBIT.radius * 0.7; // tighter radius for spin

  function step() {
    if (i >= count) {
      anim = false; gestLock = false; return;
    }
    const tile = document.querySelector('.tile');
    if (!tile) { anim = false; gestLock = false; return; }

    const progress = i / count;
    const exitDur = 0.08 + progress * 0.1;
    const enterDur = 0.08 + progress * 0.12;
    const exitAngle = 100 + progress * 20;
    const state = { angle: 0 };

    gsap.killTweensOf(tile);
    gsap.to(state, {
      angle: exitAngle,
      duration: exitDur,
      ease: 'cubic-bezier(0.4, 0.0, 0.7, 1.0)',
      onUpdate: () => {
        const p = boomPos(state.angle, R, sign);
        const prog = state.angle / exitAngle;
        const op = prog < 0.5 ? 1 : Math.cos((prog - 0.5) * Math.PI);
        gsap.set(tile, { y: p.y, z: p.z, rotateX: p.rotX, opacity: Math.max(0, op) });
      },
      onComplete: () => {
        tile.remove();
        idx = (idx + dir + filtered.length) % filtered.length;
        renderTile();
        const newTile = document.querySelector('.tile');
        if (newTile && i < count - 1) {
          const enterState = { angle: 80 };
          const enterSign = -sign;
          gsap.set(newTile, { opacity: 0 });
          gsap.to(enterState, {
            angle: 0,
            duration: enterDur,
            ease: 'cubic-bezier(0.0, 0.0, 0.2, 1.0)',
            onUpdate: () => {
              const p = boomPos(enterState.angle, R, enterSign);
              const prog = enterState.angle / 80;
              gsap.set(newTile, { y: p.y, z: p.z, rotateX: p.rotX, opacity: prog > 0.5 ? 1 - (prog - 0.5) * 2 : 1 });
            },
            onComplete: () => {
              gsap.set(newTile, { y: 0, z: 0, rotateX: 3, opacity: 1 });
              i++; step();
            }
          });
        } else {
          enterTile(dir);
          setTimeout(() => { i++; step(); }, ORBIT.enterDur * 1000);
        }
      }
    });
  }
  step();
}

// Shuffle — fewer spins, snappier
document.getElementById('shuffleBtn').addEventListener('click', () => {
  if (anim || !filtered.length) return;
  spinNav(1, 2 + Math.floor(Math.random() * 3));
});

// ============================================
// INTRO SCREEN
// ============================================
(function initIntro() {
  const wf = document.getElementById('waveform');
  const barCount = 28;
  for (let i = 0; i < barCount; i++) {
    const bar = document.createElement('div');
    bar.className = 'waveform-bar';
    // Voice-like waveform: louder in center, quieter at edges
    const center = Math.abs(i - barCount / 2) / (barCount / 2);
    const maxH = Math.round(8 + (1 - center) * 20 + Math.random() * 6);
    bar.style.setProperty('--bar-h', maxH + 'px');
    bar.style.animationDelay = (i * 0.04 + Math.random() * 0.15) + 's';
    bar.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
    wf.appendChild(bar);
  }

  // Dismiss after 2.8s
  setTimeout(() => {
    const intro = document.getElementById('introScreen');
    intro.classList.add('fade-out');
    setTimeout(() => { intro.remove(); }, 800);
  }, 2800);
})();

// ============================================
// INIT
// ============================================
filterRender();
</script>
