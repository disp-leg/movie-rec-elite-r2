<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Movie Rec — Frosted Glass Variant</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf8f5;--card:rgba(255,255,255,0.75);--card-border:rgba(0,0,0,0.06);--text:#1a1a1a;--dim:#888;--accent:#7c5bf5;--accent2:#e85d75;--radius:24px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;height:100vh;width:100vw;max-width:430px;margin:0 auto;position:relative;user-select:none}
#three-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#ambient-glow{position:fixed;top:50%;left:50%;width:280px;height:280px;border-radius:50%;transform:translate(-50%,-50%);filter:blur(100px);opacity:0.15;transition:background 1.5s ease;z-index:1;pointer-events:none}
.app{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column}
.header{padding:18px 22px 0}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;background:linear-gradient(135deg,#7c5bf5,#e85d75,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{font-size:11px;color:var(--dim);margin-top:3px;font-weight:400;letter-spacing:0.5px}
.tabs{display:flex;gap:8px;padding:16px 22px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;padding:8px 18px;border-radius:30px;font-size:12px;font-weight:500;background:rgba(0,0,0,0.03);color:var(--dim);border:1px solid rgba(0,0,0,0.06);cursor:pointer;transition:all 0.3s ease;backdrop-filter:blur(10px);flex-shrink:0}
.tab.active{background:linear-gradient(135deg,#7c5bf5,#e85d75);color:#fff;border-color:transparent;font-weight:600;box-shadow:0 4px 16px rgba(124,91,245,0.25)}
.carousel-area{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-container{position:absolute;width:350px}
.card{width:100%;border-radius:var(--radius);background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--card-border);box-shadow:0 8px 40px rgba(0,0,0,0.06),0 1px 3px rgba(0,0,0,0.04);overflow:hidden;cursor:pointer;transform-style:preserve-3d;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1)}
.card.flipped{transform:rotateY(180deg)}
.card-face{backface-visibility:hidden;width:100%}
.card-back{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotateY(180deg);backface-visibility:hidden;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius);padding:24px;overflow-y:auto}
.poster-wrap{width:100%;aspect-ratio:2/3;overflow:hidden;border-radius:var(--radius) var(--radius) 0 0;position:relative}
.poster-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.card-info{padding:16px 20px 10px}
.card-info .title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;line-height:1.2;margin-bottom:3px}
.card-info .meta{font-size:11px;color:var(--dim);margin-bottom:8px}
.card-info .meta .yr{color:var(--accent);font-weight:600}
.lb-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:3px 8px;border-radius:20px;background:linear-gradient(135deg,rgba(124,91,245,0.1),rgba(232,93,117,0.1));color:var(--accent);font-weight:600;margin-left:6px}
.quotes{padding:0 20px 14px}
.quote{font-size:11px;line-height:1.5;margin-bottom:8px;padding:10px 12px;border-radius:14px;font-style:italic;color:#555}
.quote.q1{background:rgba(232,93,117,0.06);border-left:3px solid rgba(232,93,117,0.3)}
.quote.q5{background:rgba(124,91,245,0.06);border-left:3px solid rgba(124,91,245,0.3)}
.streaming{display:flex;flex-wrap:wrap;gap:6px;padding:0 20px 12px}
.stream-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:10px;font-weight:500;background:rgba(0,0,0,0.03);color:var(--dim);text-decoration:none;border:1px solid rgba(0,0,0,0.06);transition:all 0.2s;backdrop-filter:blur(8px)}
.stream-chip:hover{background:rgba(124,91,245,0.08);color:var(--accent);border-color:rgba(124,91,245,0.2)}
.stream-chip .dot{width:6px;height:6px;border-radius:50%}
.actions-bar{display:flex;justify-content:center;gap:10px;padding:8px 20px 12px}
.action-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(0,0,0,0.08);background:rgba(0,0,0,0.02);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;font-size:15px;color:var(--dim)}
.action-btn:hover,.action-btn.active{background:linear-gradient(135deg,#7c5bf5,#e85d75);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(124,91,245,0.3);transform:scale(1.1)}
.star-rating{display:flex;gap:4px;justify-content:center;padding-bottom:16px}
.star{font-size:20px;cursor:pointer;color:rgba(0,0,0,0.1);transition:color 0.2s}
.star.filled{color:#f5a623}
.back-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#7c5bf5,#e85d75);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.back-dir{font-size:12px;color:var(--dim);margin-bottom:14px}
.back-synopsis{font-size:13px;line-height:1.7;color:#555;margin-bottom:16px}
.back-section{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
.back-streaming{display:flex;flex-wrap:wrap;gap:6px}
.shuffle-btn{position:fixed;bottom:24px;right:24px;z-index:10;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#7c5bf5,#e85d75);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 8px 24px rgba(124,91,245,0.3);display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
.shuffle-btn:hover{transform:scale(1.1)}
.nav-hint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:10;font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;opacity:0.4}
.counter{position:fixed;top:18px;right:22px;z-index:10;font-size:11px;color:var(--dim);font-weight:500}
</style>
</head>
<body>
<canvas id="three-bg"></canvas>
<div id="ambient-glow"></div>
<div class="app">
  <div class="header">
    <h1>Movie Rec</h1>
    <div class="sub">Curated Deep Cuts &bull; The Divide Universe</div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="carousel-area" id="carousel"></div>
</div>
<div class="counter" id="counter"></div>
<button class="shuffle-btn" id="shuffleBtn" title="Shuffle">&#x1f3b2;</button>
<div class="nav-hint">Swipe up / down</div>

<script>
const movies=[
{id:1,title:"Right at Your Door",year:2006,director:"Chris Gorak",tier:"direct",poster:"https://image.tmdb.org/t/p/w500/sBkCtdpkWRiisQ3vzyNOZ72biCB.jpg",synopsis:"Dirty bomb hits LA; husband seals himself inside the house while wife is outside. Same claustrophobic domestic apocalypse tension as The Divide. Paranoia escalates in a sealed space with dwindling trust.",streaming:["Tubi","Pluto TV"],rating:3.1,quote1:"\u2605 \"A marriage stress-test disguised as a low-budget LA panic nightmare, and somehow the marriage loses.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"Sealed my husband outside during a gas leak once. Didn\u2019t realise this movie was a how-to guide.\"",color:"#c49a3a"},
{id:2,title:"Hidden",year:2015,director:"Matt Duffer, Ross Duffer",tier:"direct",poster:"https://image.tmdb.org/t/p/w500/mPuaHaczkoJDzlYD9GyXiDjMXig.jpg",synopsis:"Family hiding in a bunker after an outbreak. Pre-Stranger Things Duffer Brothers. Claustrophobic survival with a twist ending. Same shelter-in-place dread.",streaming:["Netflix","Amazon Prime"],rating:3.1,quote1:"\u2605 \"The only way this movie should be watched is split into 10 parts with subway surfers covering half the screen.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"The twist absolutely EATS!!!! i was having a fine time for most of it but when the reveal happens OOHHHHH SUDDENLY ITS ALL WORTH IT\"",color:"#1a5a3a"},
{id:3,title:"Carriers",year:2009,director:"Alex Pastor, David Pastor",tier:"direct",poster:"https://image.tmdb.org/t/p/w500/jxjnjHtHXgvjdhkwpelE9ZwVMg6.jpg",synopsis:"Four survivors navigate a pandemic wasteland with strict rules to avoid infection. Moral decay under survival pressure mirrors The Divide\u2019s group disintegration.",streaming:["Amazon Prime","Tubi"],rating:2.8,quote1:"\u2605 \"Could have been called \u2018How To Be An Asshole at The End Of The World\u2019 and saved everyone 84 minutes of their lives.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"I hate this fucking movie and every god damn thing about it but I\u2019ve watched it four times so make of that what you will.\"",color:"#c4a53a"},
{id:4,title:"It Comes at Night",year:2017,director:"Trey Edward Shults",tier:"direct",poster:"https://image.tmdb.org/t/p/w500/rNKJpFMlOZn5zkzBPZxEJrQn5Km.jpg",synopsis:"Family boarded up in a house during an unspecified plague. Another family arrives. Trust erodes into paranoia and violence. The quintessential \u2018who can you trust\u2019 film.",streaming:["Netflix","Amazon Prime"],rating:3.1,quote1:"\u2605 \"I can\u2019t tell what was worse \u2014 never finding out what comes at night, or the aspect ratio.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"Anyone else losing their entire fucking mind\"",color:"#3a2a0a"},
{id:5,title:"Await Further Instructions",year:2018,director:"Johnny Kevorkian",tier:"direct",poster:"https://image.tmdb.org/t/p/w500/afvi5tVi5S3Ux9faZaI32SmPRkj.jpg",synopsis:"Family trapped in their house on Christmas Day by a mysterious barricade. TV gives increasingly sinister instructions. Sealed-in paranoia with family tensions boiling over.",streaming:["Netflix","Shudder"],rating:2.5,quote1:"\u2605 \"The writer of this film should be sent to prison. Not metaphorically. Actual prison.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"A Christmas movie about a racist family being eaten by their television. I will be revisiting this every December.\"",color:"#2a3a5a"},
{id:6,title:"Coherence",year:2013,director:"James Ward Byrkit",tier:"claustrophobic",poster:"https://image.tmdb.org/t/p/w500/ezUtb9m5DeLwL2gxi4gktzNCvQv.jpg",synopsis:"Dinner party goes wrong when a comet passes overhead. Reality fractures. Shot in a single house with improvised dialogue. Pure Divide energy.",streaming:["Amazon Prime","Tubi"],rating:3.7,quote1:"\u2605 \"The Blair Witch Project for insufferable yuppies who own too many wine glasses.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"If there are a million different realities, I have slept with your wife in every single one of them.\"",color:"#1a2a5e"},
{id:7,title:"Pontypool",year:2008,director:"Bruce McDonald",tier:"claustrophobic",poster:"https://image.tmdb.org/t/p/w500/uh4n9FSYYaeOWchP8gBPNtg7kD7.jpg",synopsis:"Radio DJ trapped in his station as a virus spreads through the English language. Almost entirely one location. Cerebral claustrophobia.",streaming:["Shudder","Tubi"],rating:3.3,quote1:"\u2605 \"Hilarious that a film about radio DJs can\u2019t even get the vocals on the right frequency. Truly committed to the bit.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"What if Night of the Living Dead was a locked-in War of the Worlds radio play starring Kawartha Lakes\u2019 Howard Stern? Perfection.\"",color:"#5a2a1a"},
{id:8,title:"The Platform",year:2019,director:"Galder Gaztelu-Urrutia",tier:"claustrophobic",poster:"https://image.tmdb.org/t/p/w500/iXvQnzy6JCAx1PiQEKXuTY04ZHl.jpg",synopsis:"Vertical prison where food descends level by level. Residents on upper floors feast; lower floors starve. Brutal social allegory.",streaming:["Netflix"],rating:3.4,quote1:"\u2605 \"I was with it and then it ended and now I\u2019m mad. I wanted to throw up and I didn\u2019t even get an explanation. So dumb.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"This is the most fucked up Mukbang I\u2019ve ever seen and I genuinely cannot stop thinking about it.\"",color:"#4a4a2a"},
{id:9,title:"Exam",year:2009,director:"Stuart Hazeldine",tier:"claustrophobic",poster:"https://image.tmdb.org/t/p/w500/i1J2zBCyOQJKsQipqJ0qXERC1Ma.jpg",synopsis:"Eight candidates in a single room for a final job interview. One question, 80 minutes, strict rules. Group dynamics fracture under pressure.",streaming:["Tubi","Amazon Prime"],rating:3.3,quote1:"\u2605 \"Eight people locked in a room fail to ask a question for 90 minutes. Truly the most realistic job interview ever filmed.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"SAW for people who love riddles and there\u2019s no gore at all, which means it\u2019s somehow more disturbing than SAW.\"",color:"#2a2a4a"},
{id:10,title:"The Bar",year:2017,director:"Alex de la Iglesia",tier:"claustrophobic",poster:"https://image.tmdb.org/t/p/w500/vYyALnKnzHLv4PoU2b447GYT8R9.jpg",synopsis:"Patrons trapped in a Madrid bar after a sniper kills anyone who exits. Paranoia mounts as they turn on each other.",streaming:["Netflix","Amazon Prime"],rating:3.0,quote1:"\u2605 \"Starts as a clever absurdist siege thriller and ends as a loud, boring descent into a sewer. Literally.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"People trapped in a Madrid bar after a shooting. Devolved into full Lord of the Flies within 20 minutes. This is peak cinema.\"",color:"#5a4a2a"},
{id:11,title:"Circle",year:2015,director:"Aaron Hann, Mario Miscione",tier:"survival",poster:"https://image.tmdb.org/t/p/w500/hbIL53MdZFJXsgxXaSOVuApWTs8.jpg",synopsis:"50 strangers in a circle. Every 2 minutes, one dies by group vote. Pure survival psychology with no escape.",streaming:["Netflix","Tubi"],rating:2.9,quote1:"\u2605 \"50 people slowly eliminate each other with no explanation and I eliminated myself from the couch after 30 minutes.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"What a shitty prize. You get to live on an earth populated by the orphans, pregnant women, and other assholes humanity voted to keep.\"",color:"#1a1a3e"},
{id:12,title:"Would You Rather",year:2012,director:"David Guy Levy",tier:"survival",poster:"https://image.tmdb.org/t/p/w500/tos5MpjaOsAFVGjjieQlZsHlbd.jpg",synopsis:"Desperate guests at a rich man\u2019s dinner party forced into increasingly brutal \u2018would you rather\u2019 choices.",streaming:["Tubi","Amazon Prime"],rating:2.8,quote1:"\u2605 \"The good thing about this film is it goes quickly. The bad thing is it exists.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"My favourite part was when she forgot she had been stabbed. Method acting in reverse.\"",color:"#4a1a2a"},
{id:13,title:"Fermat\u2019s Room",year:2007,director:"Luis Piedrahita, Rodrigo Sope\u00f1a",tier:"survival",poster:"https://image.tmdb.org/t/p/w500/qQcYvPXxvk6bQDV9Zgd6cnDQmKZ.jpg",synopsis:"Four mathematicians locked in a room that shrinks unless they solve puzzles. Literal claustrophobia as survival mechanism.",streaming:["Amazon Prime","Tubi"],rating:3.2,quote1:"\u2605 \"WHAT HAPPENS ON THE GODDAMN BOAT?! This film\u2019s worst sin is attempting intelligence and landing at kindergarten.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"My guy was going to kill four people and himself over math. It\u2019s not that deep bro. And yet I respect him completely.\"",color:"#2e4a2a"},
{id:14,title:"Level 16",year:2018,director:"Danishka Esterhazy",tier:"survival",poster:"https://image.tmdb.org/t/p/w500/glVIjhLmzmgtppLWb3lvnoPljGW.jpg",synopsis:"Girls in a mysterious boarding school discover the horrifying purpose of their captivity. Clean, clinical dread.",streaming:["Shudder","Tubi"],rating:3.0,quote1:"\u2605 \"Timely and interminable. A Handmaid\u2019s Tale riff that forgot to include anything happening.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"A very clever little Black Mirror riff that made me feel genuinely unsafe in my own bedroom and I live alone.\"",color:"#3a3a4e"},
{id:15,title:"The Incident",year:2014,director:"Isaac Ezban",tier:"survival",poster:"https://image.tmdb.org/t/p/w500/idb1ACZCQAsYJCFMfs9vgyBIbP1.jpg",synopsis:"Two groups trapped in infinite loops \u2014 one in a stairwell, one on a highway. Time passes but space repeats. Existential claustrophobia.",streaming:["Amazon Prime","Tubi"],rating:3.1,quote1:"\u2605 \"What was that incident?! The incident was this movie being made and nobody warning me.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"A sci-fi horror masterclass in breaking your heart and stealing your sanity. The weight of infinity before your eyes. I am not okay.\"",color:"#2a2a3e"},
{id:16,title:"Pandorum",year:2009,director:"Christian Alvart",tier:"adjacent",poster:"https://image.tmdb.org/t/p/w500/mNMfa6r3pl0EzFIKEkVcxyr6Rc7.jpg",synopsis:"Crew wakes on a spaceship with no memory. Something is hunting them in the dark. The Divide in space.",streaming:["Amazon Prime","Tubi"],rating:3.2,quote1:"\u2605 \"I\u2019ve never been more confused in my life and I once took an Ambien and watched Tenet.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"Basically two films in one and both of them slap. Criminally underseen. Dennis Quaid deserved a sequel and a raise.\"",color:"#1e2a4e"},
{id:17,title:"The Void",year:2016,director:"Jeremy Gillespie, Steven Kostanski",tier:"adjacent",poster:"https://image.tmdb.org/t/p/w500/2WhZAPi3vomEQdzAPIYTvmvWaxI.jpg",synopsis:"People trapped in a hospital surrounded by cultists. Cosmic horror seeps in. Practical effects, siege dynamics.",streaming:["Shudder","Tubi"],rating:3.0,quote1:"\u2605 \"This warmed-over Lovecraft nonsense is exactly the dull fate this protagonist deserves, and somehow also me for watching it.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"Grim, forlorn dankness, extraterrestrial gods, cultists with knives, and XTREME Carpenter worship. This is everything. I am fed.\"",color:"#2a1e4a"},
{id:18,title:"Breathing Room",year:2008,director:"John Suits, Gabriel Cowan",tier:"adjacent",poster:"https://image.tmdb.org/t/p/w500/aaz4rgsEjApkUz87OrFT6sNZDks.jpg",synopsis:"Strangers wake in a locked white room wearing explosive collars. Must figure out the rules or die.",streaming:["Tubi"],rating:2.4,quote1:"\u2605 \"Found this in a 10 for $1 used DVD bin. Ten cents feels like maybe a bit much.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"A not-as-good version of Exam, which is a compliment, because Exam is incredible and this one still broke my brain on a Tuesday.\"",color:"#3a3a3a"},
{id:19,title:"The Hole",year:2001,director:"Nick Hamm",tier:"adjacent",poster:"https://image.tmdb.org/t/p/w500/n5aMoI6AZLJzUoNbjMj0P60EYMJ.jpg",synopsis:"Four teens voluntarily lock themselves in a WWII bunker for a party weekend. The voluntary confinement turning deadly.",streaming:["Amazon Prime"],rating:2.9,quote1:"\u2605 \"The DVD cover says \u2018super scary. brilliant.\u2019 which is obviously a lie written by someone who has never met either of those things.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"Thora Birch locked her friends in an underground bunker to steal a boy and it almost worked. Respect the commitment to the bit.\"",color:"#2e2e4a"},
{id:20,title:"The Bunker",year:2024,director:"Adrian Langley",tier:"adjacent",poster:"https://image.tmdb.org/t/p/w500/jOA7chFPVzSyPp2DaRg8hqA1BHr.jpg",synopsis:"Survivors in a bunker after nuclear event. Resources dwindle, tensions rise, paranoia sets in. The most direct spiritual successor to The Divide.",streaming:["Tubi","Amazon Prime"],rating:2.6,quote1:"\u2605 \"The shit I will sit through for Tobin Bell and Tony Todd. And this is where that journey ends.\"",quote5:"\u2605\u2605\u2605\u2605\u2605 \"The whole film is one long Zoom call about a bioweapon and somehow that\u2019s exactly what I needed on a Friday night.\"",color:"#2a4a2a"}
];

const tiers=[{key:"direct",label:"Direct Matches"},{key:"claustrophobic",label:"Claustrophobic"},{key:"survival",label:"Survival"},{key:"adjacent",label:"Adjacent"}];
const streamUrl=(p,t)=>{const e=encodeURIComponent(t),h=t.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,'');return{Netflix:`https://www.netflix.com/search?q=${e}`,"Amazon Prime":`https://www.amazon.com/s?k=${e}&i=instant-video`,Shudder:`https://www.shudder.com/search?q=${e}`,Tubi:`https://tubitv.com/search/${e}`,"Pluto TV":`https://pluto.tv/search/details/${e}`,Dopebox:`https://dopebox.to/search/${h}`}[p]||'#'};
const streamColors={Netflix:"#e50914","Amazon Prime":"#00a8e1",Shudder:"#a259ff",Tubi:"#fa382f","Pluto TV":"#00b3e3",Dopebox:"#50c878"};

let currentTier="direct",filteredMovies=[],currentIndex=0,userRatings={},userActions={},isFlipped=false,isAnimating=false;

// Three.js — floating iridescent shape
const canvas=document.getElementById('three-bg');
const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,100);
cam.position.z=20;

const ambLight=new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambLight);
const dirLight=new THREE.DirectionalLight(0xffffff,0.8);
dirLight.position.set(5,5,10);
scene.add(dirLight);

// Torus knot
const torusGeo=new THREE.TorusKnotGeometry(2.5,0.8,100,16);
const torusMat=new THREE.MeshPhongMaterial({color:0x7c5bf5,emissive:0x2a1a5a,specular:0xe85d75,shininess:100,transparent:true,opacity:0.12});
const torus=new THREE.Mesh(torusGeo,torusMat);
torus.position.set(6,-4,0);
scene.add(torus);

// Small floating sphere
const sphereGeo=new THREE.SphereGeometry(1.2,32,32);
const sphereMat=new THREE.MeshPhongMaterial({color:0xe85d75,emissive:0x3a1a2a,specular:0xf5a623,shininess:80,transparent:true,opacity:0.1});
const sphere=new THREE.Mesh(sphereGeo,sphereMat);
sphere.position.set(-5,5,0);
scene.add(sphere);

function animBg(){
  requestAnimationFrame(animBg);
  torus.rotation.x+=0.003;
  torus.rotation.y+=0.005;
  sphere.rotation.y+=0.004;
  sphere.position.y=5+Math.sin(Date.now()*0.001)*0.5;
  renderer.render(scene,cam);
}
animBg();

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  cam.aspect=window.innerWidth/window.innerHeight;
  cam.updateProjectionMatrix();
});

// Tabs
const tabsEl=document.getElementById('tabs');
tiers.forEach(t=>{
  const tab=document.createElement('div');
  tab.className='tab'+(t.key==='direct'?' active':'');
  tab.textContent=t.label;
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    tab.classList.add('active');
    currentTier=t.key;
    filterAndRender();
  });
  tabsEl.appendChild(tab);
});

function filterAndRender(){
  filteredMovies=movies.filter(m=>m.tier===currentTier);
  currentIndex=0;isFlipped=false;
  renderCard();
}

function updateCounter(){
  document.getElementById('counter').textContent=(currentIndex+1)+' / '+filteredMovies.length;
}

function renderCard(){
  const carousel=document.getElementById('carousel');
  carousel.textContent='';
  if(!filteredMovies.length)return;
  const m=filteredMovies[currentIndex];
  document.getElementById('ambient-glow').style.background=m.color;
  updateCounter();

  const container=document.createElement('div');
  container.className='card-container';
  const card=document.createElement('div');
  card.className='card';

  // Front
  const front=document.createElement('div');
  front.className='card-face';
  const pw=document.createElement('div');
  pw.className='poster-wrap';
  const img=document.createElement('img');
  img.src=m.poster;img.alt=m.title;img.loading='eager';
  pw.appendChild(img);front.appendChild(pw);

  const info=document.createElement('div');
  info.className='card-info';
  const ti=document.createElement('div');
  ti.className='title';ti.textContent=m.title;
  const me=document.createElement('div');
  me.className='meta';
  const yr=document.createElement('span');yr.className='yr';yr.textContent=m.year;
  me.appendChild(yr);me.appendChild(document.createTextNode(' \u2022 '+m.director));
  const lb=document.createElement('span');lb.className='lb-badge';lb.textContent='\u2605 '+m.rating;
  me.appendChild(lb);
  info.appendChild(ti);info.appendChild(me);front.appendChild(info);

  const qd=document.createElement('div');qd.className='quotes';
  const q1=document.createElement('div');q1.className='quote q1';q1.textContent=m.quote1;
  const q5=document.createElement('div');q5.className='quote q5';q5.textContent=m.quote5;
  qd.appendChild(q1);qd.appendChild(q5);front.appendChild(qd);

  const sd=document.createElement('div');sd.className='streaming';
  [...m.streaming,'Dopebox'].forEach(p=>{
    const a=document.createElement('a');a.href=streamUrl(p,m.title);a.target='_blank';a.rel='noopener';a.className='stream-chip';
    const d=document.createElement('span');d.className='dot';d.style.background=streamColors[p]||'#888';
    a.appendChild(d);a.appendChild(document.createTextNode(p));sd.appendChild(a);
  });
  front.appendChild(sd);

  const ab=document.createElement('div');ab.className='actions-bar';
  [{key:'like',icon:'\u{1F44D}'},{key:'notlike',icon:'\u{1F44E}'},{key:'love',icon:'\u2764\uFE0F'},{key:'watched',icon:'\u{1F441}'},{key:'save',icon:'\u{1F516}'}].forEach(a=>{
    const btn=document.createElement('div');btn.className='action-btn';
    if(userActions[m.id]===a.key)btn.classList.add('active');
    btn.textContent=a.icon;btn.title=a.key;
    btn.addEventListener('click',e=>{e.stopPropagation();userActions[m.id]=userActions[m.id]===a.key?null:a.key;
    document.querySelectorAll('.action-btn').forEach(b=>b.classList.remove('active'));
    if(userActions[m.id])btn.classList.add('active');});
    ab.appendChild(btn);
  });
  front.appendChild(ab);

  const sr=document.createElement('div');sr.className='star-rating';
  for(let i=1;i<=5;i++){
    const s=document.createElement('span');s.className='star'+((userRatings[m.id]||0)>=i?' filled':'');
    s.textContent='\u2605';
    s.addEventListener('click',e=>{e.stopPropagation();userRatings[m.id]=userRatings[m.id]===i?0:i;
    sr.querySelectorAll('.star').forEach((x,idx)=>x.classList.toggle('filled',idx<(userRatings[m.id]||0)));});
    sr.appendChild(s);
  }
  front.appendChild(sr);

  // Back
  const back=document.createElement('div');back.className='card-back card-face';
  const bt=document.createElement('div');bt.className='back-title';bt.textContent=m.title+' ('+m.year+')';
  back.appendChild(bt);
  const bd=document.createElement('div');bd.className='back-dir';bd.textContent='Directed by '+m.director;
  back.appendChild(bd);
  const bs=document.createElement('div');bs.className='back-synopsis';bs.textContent=m.synopsis;
  back.appendChild(bs);
  const bq1=document.createElement('div');bq1.className='quote q1';bq1.textContent=m.quote1;back.appendChild(bq1);
  const bq5=document.createElement('div');bq5.className='quote q5';bq5.textContent=m.quote5;back.appendChild(bq5);
  const bsl=document.createElement('div');bsl.className='back-section';bsl.textContent='Stream Now';back.appendChild(bsl);
  const bsd=document.createElement('div');bsd.className='back-streaming';
  [...m.streaming,'Dopebox'].forEach(p=>{
    const a=document.createElement('a');a.href=streamUrl(p,m.title);a.target='_blank';a.rel='noopener';a.className='stream-chip';
    const d=document.createElement('span');d.className='dot';d.style.background=streamColors[p]||'#888';
    a.appendChild(d);a.appendChild(document.createTextNode(p));bsd.appendChild(a);
  });
  back.appendChild(bsd);

  card.appendChild(front);card.appendChild(back);container.appendChild(card);carousel.appendChild(container);
  card.addEventListener('click',()=>{isFlipped=!isFlipped;card.classList.toggle('flipped',isFlipped);});
  gsap.fromTo(container,{y:60,opacity:0,scale:0.92},{y:0,opacity:1,scale:1,duration:0.5,ease:'power3.out'});
}

// Swipe
let tsy=0,tst=0;
const cel=document.getElementById('carousel');
cel.addEventListener('touchstart',e=>{if(isAnimating)return;tsy=e.touches[0].clientY;tst=Date.now();},{passive:true});
cel.addEventListener('touchend',e=>{if(isAnimating)return;const dy=tsy-e.changedTouches[0].clientY,dt=Date.now()-tst,v=Math.abs(dy)/Math.max(dt,1);
if(Math.abs(dy)>30){const dir=dy>0?1:-1;if(v>1.5){spinThrough(dir,Math.min(Math.floor(v*2),filteredMovies.length-1));}else{navigate(dir);}}},{passive:true});

let md=false,msy=0,mst=0;
cel.addEventListener('mousedown',e=>{if(isAnimating)return;md=true;msy=e.clientY;mst=Date.now();});
window.addEventListener('mouseup',e=>{if(!md)return;md=false;const dy=msy-e.clientY,dt=Date.now()-mst,v=Math.abs(dy)/Math.max(dt,1);
if(Math.abs(dy)>30){const dir=dy>0?1:-1;if(v>1.5){spinThrough(dir,Math.min(Math.floor(v*2),filteredMovies.length-1));}else{navigate(dir);}}});

document.addEventListener('keydown',e=>{if(e.key==='ArrowUp')navigate(-1);if(e.key==='ArrowDown')navigate(1);if(e.key===' '){e.preventDefault();document.querySelector('.card')?.click();}});

function navigate(dir){
  if(isAnimating||!filteredMovies.length)return;isAnimating=true;isFlipped=false;
  const c=document.querySelector('.card-container');
  gsap.to(c,{y:dir>0?-160:160,opacity:0,scale:0.8,rotateX:dir*12,duration:0.3,ease:'power2.in',onComplete:()=>{
    currentIndex=(currentIndex+dir+filteredMovies.length)%filteredMovies.length;renderCard();isAnimating=false;}});
}

function spinThrough(dir,count){
  if(isAnimating||!filteredMovies.length)return;isAnimating=true;isFlipped=false;
  let i=0;function step(){if(i>=count){isAnimating=false;return;}
  const c=document.querySelector('.card-container');
  gsap.to(c,{y:dir>0?-100:100,opacity:0,scale:0.88,duration:0.1+i*0.03,ease:'power1.in',onComplete:()=>{
    currentIndex=(currentIndex+dir+filteredMovies.length)%filteredMovies.length;renderCard();i++;
    if(i<count)step();else isAnimating=false;}});}step();
}

document.getElementById('shuffleBtn').addEventListener('click',()=>{if(isAnimating||!filteredMovies.length)return;spinThrough(1,3+Math.floor(Math.random()*5));});

filterAndRender();
</script>
</body>
</html>
